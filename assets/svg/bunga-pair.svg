<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240" role="img" aria-label="Bunga raya hibiscus pair: Bahasa Melayu (green) with Jawi (gray, faded, tucked behind)">
  <title>Bunga Raya Pair — Bahasa Melayu and Jawi</title>
  <desc>Green hibiscus representing Bahasa Melayu, large and centered. Smaller gray hibiscus representing Jawi, faded and tucked behind to the lower right.</desc>

  <!-- Gray Jawi: smaller (62%), offset bottom-right, drawn first so green sits on top -->
  <g id="jawi" transform="translate(195, 158)" opacity="0.32">
    <g transform="scale(0.62)">
      <g transform="rotate(0)"><path d="M0,0 C-18,-8 -32,-28 -28,-48 C-24,-62 -10,-65 0,-52 C10,-65 24,-62 28,-48 C32,-28 18,-8 0,0Z" fill="#7f8c8d" opacity="0.72"/></g>
      <g transform="rotate(72)"><path d="M0,0 C-18,-8 -32,-28 -28,-48 C-24,-62 -10,-65 0,-52 C10,-65 24,-62 28,-48 C32,-28 18,-8 0,0Z" fill="#7f8c8d" opacity="0.78"/></g>
      <g transform="rotate(144)"><path d="M0,0 C-18,-8 -32,-28 -28,-48 C-24,-62 -10,-65 0,-52 C10,-65 24,-62 28,-48 C32,-28 18,-8 0,0Z" fill="#7f8c8d" opacity="0.82"/></g>
      <g transform="rotate(216)"><path d="M0,0 C-18,-8 -32,-28 -28,-48 C-24,-62 -10,-65 0,-52 C10,-65 24,-62 28,-48 C32,-28 18,-8 0,0Z" fill="#7f8c8d" opacity="0.74"/></g>
      <g transform="rotate(288)"><path d="M0,0 C-18,-8 -32,-28 -28,-48 C-24,-62 -10,-65 0,-52 C10,-65 24,-62 28,-48 C32,-28 18,-8 0,0Z" fill="#7f8c8d" opacity="0.86"/></g>
      <circle cx="0" cy="0" r="8" fill="#3a4244"/>
      <circle cx="0" cy="0" r="5" fill="#5d686a" opacity="0.75"/>
      <line x1="0" y1="0" x2="0" y2="-36" stroke="#9ba2a4" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-2" cy="-28" r="1.5" fill="#c5cdce"/>
      <circle cx="2" cy="-30" r="1.5" fill="#c5cdce"/>
      <circle cx="0" cy="-36" r="3" fill="#c5cdce"/>
    </g>
  </g>

  <!-- Green Bahasa Melayu: large, centered, on top -->
  <g id="bahasa-melayu" transform="translate(125, 108)">
    <g transform="rotate(0)"><path d="M0,0 C-22,-10 -38,-32 -34,-58 C-30,-74 -12,-78 0,-62 C12,-78 30,-74 34,-58 C38,-32 22,-10 0,0Z" fill="#27ae60" opacity="0.62"/></g>
    <g transform="rotate(72)"><path d="M0,0 C-22,-10 -38,-32 -34,-58 C-30,-74 -12,-78 0,-62 C12,-78 30,-74 34,-58 C38,-32 22,-10 0,0Z" fill="#27ae60" opacity="0.70"/></g>
    <g transform="rotate(144)"><path d="M0,0 C-22,-10 -38,-32 -34,-58 C-30,-74 -12,-78 0,-62 C12,-78 30,-74 34,-58 C38,-32 22,-10 0,0Z" fill="#27ae60" opacity="0.80"/></g>
    <g transform="rotate(216)"><path d="M0,0 C-22,-10 -38,-32 -34,-58 C-30,-74 -12,-78 0,-62 C12,-78 30,-74 34,-58 C38,-32 22,-10 0,0Z" fill="#27ae60" opacity="0.66"/></g>
    <g transform="rotate(288)"><path d="M0,0 C-22,-10 -38,-32 -34,-58 C-30,-74 -12,-78 0,-62 C12,-78 30,-74 34,-58 C38,-32 22,-10 0,0Z" fill="#27ae60" opacity="0.82"/></g>
    <circle cx="0" cy="0" r="10" fill="#0a3a1c"/>
    <circle cx="0" cy="0" r="6" fill="#15532a" opacity="0.85"/>
    <line x1="0" y1="0" x2="0" y2="-52" stroke="#4cc177" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-3" cy="-40" r="2" fill="#FFCC00"/>
    <circle cx="3" cy="-42" r="2" fill="#FFCC00"/>
    <circle cx="-2" cy="-33" r="1.5" fill="#FFCC00"/>
    <circle cx="2" cy="-36" r="1.5" fill="#FFCC00"/>
    <circle cx="0" cy="-52" r="4" fill="#FFCC00"/>
    <circle cx="0" cy="-52" r="2" fill="#fff1a8"/>
  </g>

</svg>
