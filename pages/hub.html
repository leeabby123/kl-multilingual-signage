  zh:   { description:'招牌内容',     languagesPresent:'招牌语言',           whyThisSign:'选取原因',         representative:'代表样本',         type:'类型', langCount:(n)=>`${n} 种语言` },
  ta:   { description:'விளக்கம்',     languagesPresent:'உள்ள மொழிகள்',       whyThisSign:'தேர்வுக்கான காரணம்', representative:'சிறப்பு மாதிரி',    type:'வகை',  langCount:(n)=>n===1?'1 மொழி':`${n} மொழிகள்` },
  ms:   { description:'Penerangan',    languagesPresent:'Bahasa hadir',       whyThisSign:'Sebab pilihan',     representative:'Sampel utama',     type:'Jenis',langCount:(n)=>`${n} bahasa` },
  jawi: { description:'ڤنرڠن',        languagesPresent:'بهاس هادير',         whyThisSign:'سبب ڤيليهن',        representative:'سامڤيل اوتاما',    type:'جنيس', langCount:(n)=>`${n} بهاس` }
};

let currentOpenSign = null;  // for re-render on language switch
let previousFindingKey = null;  // 6/2 bug 6: 记录跳转到 sign-detail 之前的 finding，用于返回箭头
let previousFindingBtn = null;  // 6/2 bug 11: 保存按钮 DOM（showFinding 需要 btn 来检测 tentative class）
let activeFindingBtn = null;    // 6/2 bug 11: 追踪当前 active finding 的按钮 DOM

function escHtml(t) {
  if (!t) return '';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openClusterModal(clusterEl) {
  const id = clusterEl.id.replace('cluster-', '');
  const s = signsIndex[id];
  const modalEl = document.querySelector('.modal');
  const backdrop = document.getElementById('modal-backdrop');
  // Bug 6/11: 如果当前在 finding mode，保存 finding key + btn 并切走 finding 状态
  if (activeFindingKey) {
    previousFindingKey = activeFindingKey;
    previousFindingBtn = activeFindingBtn;
    activeFindingKey = null;
    activeFindingBtn = null;
    backdrop.classList.remove('finding-mode', 'side-left', 'side-right');
  }
  if (!s) {
    modalEl.classList.remove('sign-detail');
    document.getElementById('modal-title').style.display = '';
    document.getElementById('modal-title').textContent = id;
    document.getElementById('modal-body').innerHTML = '<p>No data found.</p>';
    currentOpenSign = null;
  } else {
    modalEl.classList.add('sign-detail');
    document.getElementById('modal-backdrop').classList.add('sign-detail');
    renderSignDetail(s);
    currentOpenSign = s;
  }
  document.getElementById('modal-backdrop').classList.add('open');
}

function renderSignDetail(s) {
  const L = (typeof currentLang !== 'undefined' && currentLang) ? currentLang : 'en';
  const labels = SIGN_DETAIL_LABELS[L] || SIGN_DETAIL_LABELS.en;

  const captionT      = (s.caption_i18n      && s.caption_i18n[L])      || s.caption      || '';
  const notesT        = (s.notes_i18n        && s.notes_i18n[L])        || s.notes        || '';
  const textContentT  = (s.text_content_i18n && s.text_content_i18n[L]) || s.text_content || '';

  let langDots = Object.entries(s.languages || {})
    .filter(([k,v]) => v)
    .map(([k]) => `<span class="lang-pill"><span class="lang-dot" style="background:${LANG_NAMES[k]?.[1]||'#888'}"></span>${LANG_NAMES[k]?.[0]||k}</span>`)
    .join('');
  if (s.other_language) {
    langDots += `<span class="lang-pill"><span class="lang-dot" style="background:#7f8c8d"></span>${escHtml(s.other_language)}</span>`;
  }

  const repBadge = s.representative
    ? `<span class="rep-badge">${escHtml(labels.representative)}</span>`
    : '';

  const backArrowHtml = previousFindingKey
    ? `<button class="sd-back-btn" id="sd-back-btn" aria-label="Back to finding"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="17,6 13,12 17,18"/><polyline points="11,6 7,12 11,18"/></svg></button>`
    : '';

  const html = `
    <div class="sd-photo-wrap">
      ${backArrowHtml}
      <img src="../photos/${s.photo_id}.jpg" alt="${s.photo_id}" class="sd-photo" loading="lazy">
    </div>
    <div class="sd-title-row">
      <h2 class="sd-title">${s.photo_id} · ${escHtml(s.district_name || s.district)}</h2>
      ${repBadge}
    </div>
    <p class="sd-meta">${escHtml(labels.type)}: ${escHtml(s.sign_type || '—')} · ${escHtml(labels.langCount(s.language_count || 0))}</p>

    ${textContentT ? `
      <div class="sd-section">
        <p class="sd-label">${escHtml(labels.description)}</p>
        <p class="sd-prose">${escHtml(textContentT)}</p>
      </div>
    ` : ''}

    <div class="sd-section">
      <p class="sd-label">${escHtml(labels.languagesPresent)}</p>
      <div class="sd-langs">${langDots}</div>
    </div>

    ${captionT ? `
      <div class="sd-section">
        <p class="sd-label">${escHtml(labels.whyThisSign)}</p>
        <p class="sd-prose">${escHtml(captionT)}</p>
      </div>
    ` : ''}

    ${notesT ? `
      <div class="sd-section sd-notes">
        <p class="sd-prose sd-italic">${escHtml(notesT)}</p>
      </div>
    ` : ''}
  `;

  document.getElementById('modal-title').style.display = 'none';
  document.getElementById('modal-body').innerHTML = html;
  // Bug 6: 返回箭头点击 → 回到 finding modal
  const backBtn = document.getElementById('sd-back-btn');
  if (backBtn) {
    backBtn.onclick = (e) => {
      e.stopPropagation();
      const restoreBtn = previousFindingBtn;
      const restoreBtnKey = restoreBtn ? restoreBtn.dataset.finding : null;
      previousFindingKey = null;
      previousFindingBtn = null;
      // 清除 sign-detail 状态
      document.querySelector('.modal').classList.remove('sign-detail');
      document.getElementById('modal-backdrop').classList.remove('sign-detail');
      currentOpenSign = null;
      // 重开 finding modal（用正确的函数 showFinding，正确的参数 buttonKey + btn DOM）
      if (restoreBtnKey && restoreBtn) {
        showFinding(restoreBtnKey, restoreBtn);
      }
    };
  }
}

document.getElementById('modal-close').onclick = () => {
  document.getElementById('modal-backdrop').classList.remove('open', 'sign-detail');
  document.querySelector('.modal').classList.remove('sign-detail');
  currentOpenSign = null;
  previousFindingKey = null;
  previousFindingBtn = null;
};
document.getElementById('modal-backdrop').onclick = (e) => {
  // 注：sign-detail 模式下 backdrop pointer-events:none，这个 handler 不会触发；
  // finding-mode 也已禁用 backdrop-click 关闭，所以这个 handler 实际上很少触发。
  // 保留以兼容 fallback case。
  if (e.target.id === 'modal-backdrop') {
    document.getElementById('modal-backdrop').classList.remove('open', 'sign-detail');
    document.querySelector('.modal').classList.remove('sign-detail');
    currentOpenSign = null;
    previousFindingKey = null;
    previousFindingBtn = null;
  }
};

// ============================================================================
// LANGUAGE SWITCHER
// ============================================================================
let currentLang = 'en';  // 6/2: Hub entry forces English, ignore localStorage
const ringPositions = {
  zh:   { x:   0.00, y: -55.00 },
  ta:   { x:  52.31, y: -16.99 },
  ms:   { x:  32.31, y:  44.49 },
  en:   { x: -32.31, y:  44.49 },
  jawi: { x: -52.31, y: -16.99 },
};
function setLanguage(lang) {
  currentLang = lang;
  try { localStorage.setItem('lang-preference', lang); } catch(e) {}
  document.documentElement.setAttribute('data-lang', lang);
  if (mapSvg) {
    ['lang-en','lang-ms','lang-zh','lang-ta','lang-jawi'].forEach(c => mapSvg.classList.remove(c));
    mapSvg.classList.add(`lang-${lang}`);
  }
  const ring = document.getElementById('active-ring');
  const pos = ringPositions[lang];
  ring.setAttribute('cx', pos.x);
  ring.setAttribute('cy', pos.y);
  // Re-render sign-detail modal if currently open (6/2)
  if (currentOpenSign && document.getElementById('modal-backdrop').classList.contains('open')) {
    renderSignDetail(currentOpenSign);
  }
}
document.querySelectorAll('.lang-switcher .petal').forEach(p => {
  p.addEventListener('click', () => setLanguage(p.dataset.lang));
});
// 6/2: Force English state on hub load (sync map class + ring + data-lang)
setLanguage('en');

// Apply persisted/default language on init (sync switcher + map + finding text + data-lang)
setLanguage(currentLang);

// ============================================================================
// FINDING BUTTONS — full interaction (filter clusters + pan/zoom + 5-lang modal)
// ============================================================================
const FINDING_KEYS = {
  'zh-ta-non-coexist': 'f1_zh_ta_separation',
  'ps-trilingual':     'f2_ps_chinese_trilingual',
  'kb-monolingual':    'f3_kb_monolingual',
  'govt-vs-shop':      'f4_gov_vs_shop',
  'tamil-official':    'f5_tamil_official_zero',
  'zh-spread':         'f6_chinese_radiation',
  'jawi-functions':    'f7_jawi_three_functions',
  'religious-exempt':  'f8_religious_exemption',
};

let findingsData = null;
let originalViewBox = null;
let activeFindingKey = null;   // tracks currently-shown finding for lang re-render

fetch('../data/findings_content.json')
  .then(r => r.json())
  .then(d => { findingsData = d.findings_long; })
  .catch(err => console.warn('findings JSON load failed:', err));

/**
 * Build a cluster predicate from a finding's relevant_clusters spec.
 * Handles 4 filter syntaxes:
 *   - explicit sign_ids list
 *   - data-district='ps'
 *   - data-sign-type IN ('government', 'road sign')
 *   - data-sign-type='religious'
 *   - data-langs contains 'zh'
 * Falls back to gov+shop type combo (used by f4_gov_vs_shop which has no filter).
 */
function buildClusterFilter(rc) {
  if (rc && rc.sign_ids) {
    const ids = new Set(rc.sign_ids);
    return c => ids.has(c.id.replace('cluster-', ''));
  }
  const f = (rc && rc.filter) ? rc.filter.toLowerCase() : '';
  let m;
  if ((m = f.match(/data-district\s*=\s*'(\w+)'/))) {
    const d = m[1].toUpperCase();
    return c => c.dataset.district === d;
  }
  if ((m = f.match(/data-sign-type\s+in\s*\(([^)]+)\)/))) {
    const types = m[1].split(',').map(s =>
      s.trim().replace(/'/g, '').replace(/\s+/g, '_').toLowerCase());
    return c => {
      const ct = (c.dataset.signType || '').toLowerCase();
      return types.some(t => ct === t || ct.startsWith(t));
    };
  }
  if ((m = f.match(/data-sign-type\s*=\s*'(\w+)'/))) {
    const t = m[1].toLowerCase();
    return c => (c.dataset.signType || '').toLowerCase().includes(t);
  }
  if ((m = f.match(/data-langs\s+contains\s+'(\w+)'/))) {
    const lang = m[1].toLowerCase();
    if (lang === 'jawi') {
      // Jawi/Arabic stored in data-other, not data-langs
      return c => /arabic|jawi/i.test(c.dataset.other || '') ||
                  (c.dataset.langs || '').toLowerCase().split(',').includes('jawi');
    }
    return c => (c.dataset.langs || '').toLowerCase().split(',').includes(lang);
  }
  // f4 fallback: government + road_sign + shop + restaurant
  return c => {
    const t = (c.dataset.signType || '').toLowerCase();
    return /government|road_sign|shop|restaurant/.test(t);
  };
}

/** Read centroid of a cluster from its <use> children's translate(). */
function clusterCenter(cluster) {
  const uses = cluster.querySelectorAll('use');
  let sx = 0, sy = 0, n = 0;
  uses.forEach(u => {
    const t = u.getAttribute('transform') || '';
    const m = t.match(/translate\(([-\d.]+)[,\s]+([-\d.]+)\)/);
    if (m) { sx += parseFloat(m[1]); sy += parseFloat(m[2]); n++; }
  });
  return n ? { x: sx / n, y: sy / n } : null;
}

/** Union bounding box of matched clusters. */
function unionBounds(clusters) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  let any = false;
  clusters.forEach(c => {
    const ctr = clusterCenter(c);
    if (!ctr) return;
    any = true;
    if (ctr.x < minX) minX = ctr.x;
    if (ctr.y < minY) minY = ctr.y;
    if (ctr.x > maxX) maxX = ctr.x;
    if (ctr.y > maxY) maxY = ctr.y;
  });
  return any ? { minX, minY, maxX, maxY } : null;
}

/** Animate map viewBox to fit bounds, preserving 1600:1000 aspect. */
function fitMapToBounds(b, margin) {
  margin = margin || 100;
  const map = document.getElementById('map-svg');
  if (!map) return;
  if (!originalViewBox) originalViewBox = map.getAttribute('viewBox');

  const targetW = (b.maxX - b.minX) + margin * 2;
  const targetH = (b.maxY - b.minY) + margin * 2;
  const cx = (b.minX + b.maxX) / 2;
  const cy = (b.minY + b.maxY) / 2;
  const ASPECT = 1600 / 1000;
  let fitW, fitH;
  if (targetW / Math.max(targetH, 1) > ASPECT) {
    fitW = Math.max(targetW, 700);
    fitH = fitW / ASPECT;
  } else {
    fitH = Math.max(targetH, 450);
    fitW = fitH * ASPECT;
  }
  const x = cx - fitW / 2;
  const y = cy - fitH / 2;
  map.style.transition = 'all 0.7s cubic-bezier(0.4, 0, 0.2, 1)';
  map.setAttribute('viewBox', `${x} ${y} ${fitW} ${fitH}`);
}

function resetMap() {
  const map = document.getElementById('map-svg');
  if (map && originalViewBox) {
    map.style.transition = 'all 0.5s ease-out';
    map.setAttribute('viewBox', originalViewBox);
  }
  document.querySelectorAll('.cluster').forEach(c =>
    c.classList.remove('dimmed', 'highlighted'));
}

/** Render finding content in active language (call on switch). */
function renderFindingContent(findingKey) {
  if (!findingsData) return;
  const f = findingsData[findingKey];
  if (!f) return;
  const title = (f.title && f.title[currentLang]) || (f.title && f.title.en) || findingKey;
  const body  = (f.body  && f.body[currentLang])  || (f.body  && f.body.en)  || '';
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = `
    <div class="finding-body"><p>${body.replace(/\n/g, '</p><p>')}</p></div>`;
}

function showFinding(buttonKey, btn) {
  const findingKey = FINDING_KEYS[buttonKey];
  if (!findingKey || !findingsData) {
    if (!findingsData) {
      document.getElementById('modal-title').textContent = 'Loading…';
      document.getElementById('modal-body').innerHTML = '<p>Findings data still loading. Try again in a moment.</p>';
      document.getElementById('modal-backdrop').classList.add('open');
    }
    return;
  }
  const finding = findingsData[findingKey];
  if (!finding) return;

  activeFindingKey = findingKey;
  activeFindingBtn = btn;  // 6/2 bug 11

  // Filter + dim/highlight clusters
  const predicate = buildClusterFilter(finding.relevant_clusters || {});
  const all = Array.from(document.querySelectorAll('.cluster'));
  const matched = [], unmatched = [];
  all.forEach(c => (predicate(c) ? matched : unmatched).push(c));
  matched.forEach(c => { c.classList.remove('dimmed'); c.classList.add('highlighted'); });
  unmatched.forEach(c => { c.classList.remove('highlighted'); c.classList.add('dimmed'); });

  // Pan/zoom to matched bounds + decide modal side
  const backdrop = document.getElementById('modal-backdrop');
  backdrop.classList.add('finding-mode');
  backdrop.classList.remove('side-left', 'side-right');

  const bounds = unionBounds(matched);
  if (bounds) {
    fitMapToBounds(bounds);
    // Modal goes to the side OPPOSITE the matched-cluster centroid
    const cx = (bounds.minX + bounds.maxX) / 2;
    backdrop.classList.add(cx > 800 ? 'side-left' : 'side-right');
  } else {
    backdrop.classList.add('side-right');
  }

  // Render text in active language
  renderFindingContent(findingKey);

  // Add a meta-chip showing tentative flag if applicable
  const isTentative = btn && btn.classList.contains('tentative');
  const chip = isTentative
    ? '<div class="finding-meta"><span class="finding-meta-chip tentative">Sample-limited</span></div>'
    : '<div class="finding-meta"><span class="finding-meta-chip">Sample n = 60 · 4 districts</span></div>';
  document.getElementById('modal-body').insertAdjacentHTML('beforeend', chip);

  backdrop.classList.add('open');
}

function closeFinding() {
  const backdrop = document.getElementById('modal-backdrop');
  backdrop.classList.remove('open', 'finding-mode', 'side-left', 'side-right');
  resetMap();
  activeFindingKey = null;
  activeFindingBtn = null;
}

// Wire up buttons
document.querySelectorAll('.finding-btn').forEach(b => {
  b.addEventListener('click', () => showFinding(b.dataset.finding, b));
});

// Close button + backdrop close → also reset map
const _origClose = document.getElementById('modal-close').onclick;
document.getElementById('modal-close').onclick = () => {
  if (activeFindingKey) closeFinding();
  else if (_origClose) _origClose();
  else document.getElementById('modal-backdrop').classList.remove('open');
};
// (Removed: finding modal 不再因为点击 backdrop 而关闭 — 按规范 6/2，
//  只能通过右上角 × 按键或 Esc 键关闭。事件穿透到地图，可正常拖动 / 缩放。)

// Esc to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && activeFindingKey) closeFinding();
});

// Re-render modal text when language switches
const _origSetLang = setLanguage;
setLanguage = function(lang) {
  _origSetLang(lang);
  if (activeFindingKey) renderFindingContent(activeFindingKey);
};
</script>
