<style>
/* ============================================================================
   Hub page · neutral background · interactive map · 5-flower switcher
   Design system anchors (matches AQC7015 capstone tokens):
     - body bg: neutral warm-gray (#e8e3d8) — slightly cooler than bottom page
     - map container max ~1200x800, centered, with shadow
     - watercolor flat illustration style throughout
     - left nav rail = Omeka-style fixed sidebar
   ============================================================================ */
:root {
  /* === Hub palette — locked 6/1 (ivory + sage scheme) === */
  --bg-page:     #fff9eb;   /* page background = ivory */
  --bg-map:      #fff9eb;   /* unified with --bg-page (6/2 fix: 消除两侧"浅一号"色带) */
  --ink:         #5a4030;   /* main text — softened from #6e3a20 */
  --ink-soft:    #8a6a50;   /* secondary text — lightened from #8a5638 */
  --line:        #d8c8b8;   /* dividers + borders — lighter */
  --accent-sage: #80c193;   /* sage swatch — leaf/garden accent */
  --accent-sage-soft: #b8dcc4;  /* tinted version for backgrounds */
  --c-zh:        #d63031;   /* 5 locked language colors — DO NOT CHANGE */
  --c-ta:        #e67e22;
  --c-ms:        #27ae60;
  --c-en:        #2980b9;
  --c-jawi:      #7f8c8d;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: Georgia, 'Noto Serif', serif;
  background: var(--bg-page);
  color: var(--ink);
  height: 100vh; overflow: hidden;
}

/* ===== LEFT NAV RAIL (Omeka-style, fixed) ===== */
.nav-rail {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: 180px;
  background: var(--accent-sage-soft);   /* sage-tinted leaf panel */
  border-right: 1px solid var(--accent-sage);
  padding: 28px 18px;
  z-index: 10;
}
.nav-rail .back {
  display: inline-flex;
  align-items: center;
  color: var(--nav-arrow-color);
  margin-bottom: 32px;
  text-decoration: none;
}
.nav-rail .back:hover { color: var(--nav-arrow-color); opacity: 0.7; }
.nav-rail .back .nav-chevron {
  width: 36px; height: 36px;
}
.nav-rail ul { list-style: none; padding: 0; margin: 0; }
.nav-rail li { margin: 14px 0; }
.nav-rail a {
  display: block;
  color: var(--ink);
  text-decoration: none;
  font-size: 14px;
  padding: 4px 0;
  border-bottom: 1px solid transparent;
}
.nav-rail a:hover { border-bottom-color: var(--ink-soft); }

/* ===== TOP FINDINGS BAR (8 buttons, single row) ===== */
.findings-bar {
  position: fixed;
  top: 0; left: 180px; right: 0;
  height: 56px;
  background: var(--bg-page);
  border-bottom: 1px solid var(--line);
  padding: 10px 24px;
  z-index: 9;
  display: flex; align-items: center; gap: 8px;
}
.finding-btn {
  flex: 1;
  background: var(--bg-map);
  border: 1.5px solid var(--ink-soft);
  border-radius: 18px;
  padding: 7px 8px;
  font-family: inherit;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  text-align: center;
  line-height: 1.2;
  letter-spacing: 0.01em;
  transition: background 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.finding-btn:hover { background: var(--accent-sage-soft); border-color: var(--accent-sage); }
.finding-btn.tentative { border-style: dashed; }

/* ===== MAP CONTAINER ===== */
.map-wrap {
  position: fixed;
  left: 180px; right: 0;
  top: 56px; bottom: 0;
  background: var(--bg-page);
  overflow: hidden;
}
.map-stage {
  position: absolute;
  inset: 20px;
  background: var(--bg-map);
  border: 1px solid var(--line);
  border-radius: 4px;
  box-shadow: 0 2px 12px rgba(110, 58, 32, 0.08);
  overflow: hidden;
  cursor: grab;
}
.map-stage:active { cursor: grabbing; }
.map-svg-host {
  width: 100%; height: 100%;
  position: relative;
  user-select: none;
  transform-origin: 0 0;
  transition: transform 0.05s linear;
}
.map-svg-host > svg {
  display: block;
  width: 100%; height: 100%;
  transform-origin: 0 0;
}
/* keep panning smooth: SVG itself is purely visual, host wrapper takes transform */
.map-svg-host > svg .cluster { cursor: pointer; }

/* zoom controls */
.zoom-ctrls {
  position: absolute;
  top: 14px; left: 18px;
  z-index: 5;
  display: flex; flex-direction: row; gap: 6px;
  align-items: center;
}
.zoom-btn {
  width: 36px; height: 36px;
  background: var(--bg-map);
  border: 1px solid var(--ink-soft);
  border-radius: 4px;
  font-size: 20px;
  font-family: inherit;
  color: var(--ink);
  cursor: pointer;
}
.zoom-btn:hover { background: var(--accent-sage-soft); }
.zoom-pct {
  font-size: 11px; color: var(--ink-soft);
  text-align: center; padding: 4px 0;
}

/* ===== 5-FLOWER LANGUAGE SWITCHER (bottom-right of map stage) ===== */
.lang-switcher {
  position: absolute;
  bottom: 14px; right: 14px;
  width: 220px; height: 180px;
  z-index: 5;
  pointer-events: none;   /* container is transparent; petals re-enable */
}
.lang-switcher svg { width: 100%; height: 100%; overflow: visible; }
.lang-switcher .petal { cursor: pointer; pointer-events: auto; transition: opacity 0.15s; }
.lang-switcher .petal:hover { opacity: 1; }
.lang-switcher .petal-label {
  fill: #000;
  pointer-events: none;
  user-select: none;
  font-weight: 600;
}

/* active language: dashed circle indicator */
.lang-switcher .active-ring {
  fill: none;
  stroke: var(--ink);
  stroke-width: 1.3;
  stroke-dasharray: 3 2;
  pointer-events: none;
}

/* ===== MODAL (signboard / finding popup) ===== */
.modal-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(110, 58, 32, 0.35);
  z-index: 20;
  align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--bg-map);
  border: 1px solid var(--ink-soft);
  border-radius: 6px;
  padding: 22px 26px;
  max-width: 480px;
  min-width: 320px;
  position: relative;
  box-shadow: 0 10px 40px rgba(110, 58, 32, 0.25);
}
.modal .close {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px;
  background: var(--bg-page);
  border: 1px solid var(--line);
  border-radius: 50%;
  font-size: 18px; color: var(--ink-soft);
  cursor: pointer;
  z-index: 10;
  display: flex; align-items: center; justify-content: center;
  line-height: 1; padding: 0;
  box-shadow: 0 1px 3px rgba(110, 58, 32, 0.12);
}
.modal .close:hover { background: var(--accent-sage-soft, #e8f1e2); }
/* finding-mode 顶部留空给 close 按钮 */
.modal-backdrop.finding-mode .finding-body { padding-top: 16px; }
.modal h2 {
  margin: 0 0 14px; font-size: 18px; color: var(--ink);
}
.modal-row {
  display: flex; gap: 10px;
  padding: 6px 0;
  border-bottom: 1px dotted var(--line);
  font-size: 13px;
}
.modal-row:last-child { border-bottom: none; }
.modal-label {
  font-weight: 700; min-width: 90px; color: var(--ink-soft);
}
.modal-value { flex: 1; color: var(--ink); }
.lang-dot {
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 50%;
  margin-right: 4px;
}

/* ===== Cluster highlight on hover ===== */
.map-svg-host svg .cluster {
  cursor: pointer;
  transition: filter 0.15s;
}
.map-svg-host svg .cluster:hover {
  filter: drop-shadow(0 0 4px rgba(110, 58, 32, 0.5));
}

/* Sidebar 5-lang nav: show only the active language's span (mirrors secondary.css) */
[data-lang-content] { display: none; }
html[data-lang="en"]   [data-lang-content="en"],
html[data-lang="ms"]   [data-lang-content="ms"],
html[data-lang="zh"]   [data-lang-content="zh"],
html[data-lang="ta"]   [data-lang-content="ta"],
html[data-lang="jawi"] [data-lang-content="jawi"] { display: revert; }
html:not([data-lang]) [data-lang-content="en"] { display: revert; }

/* ===== Finding interaction styles ===== */
.map-svg-host svg .cluster {
  transition: opacity 0.45s ease-out, filter 0.45s ease-out;
}
.map-svg-host svg .cluster.dimmed {
  opacity: 0.12;
  pointer-events: none;
}
.map-svg-host svg .cluster.highlighted {
  opacity: 1;
  filter: drop-shadow(0 0 8px rgba(128, 193, 147, 0.85));  /* sage glow */
}

/* Modal: when in sign-detail mode, backdrop 透传指针事件，让地图可拖拽缩放 */
.modal-backdrop.sign-detail {
  background: rgba(110, 58, 32, 0.12);  /* 比 finding 略深，但仍可见地图 */
  pointer-events: none;
}
.modal-backdrop.sign-detail .modal {
  pointer-events: auto;
}

/* Modal: when in finding-mode, dim backdrop less + slide modal to side */
.modal-backdrop.finding-mode {
  background: transparent;            /* 不再 dim：地图保持原色 */
  pointer-events: none;               /* 关键：事件穿透到下面的地图 */
  justify-content: flex-end;
  align-items: center;
  padding: 0 32px;
  transition: none;
}
.modal-backdrop.finding-mode .modal {
  pointer-events: auto;               /* 但 modal 自身仍可交互（× 按键、滚动）*/
}
.modal-backdrop.finding-mode.side-left {
  justify-content: flex-start;
}
.modal-backdrop.finding-mode .modal {
  max-width: 380px;
  min-width: 340px;
  max-height: 70vh;
  overflow-y: auto;
  box-shadow: 0 18px 50px rgba(110, 58, 32, 0.32);
  animation: modal-slide-in 0.45s ease-out;
}
@keyframes modal-slide-in {
  from { transform: translateX(20px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.modal-backdrop.finding-mode.side-left .modal {
  animation-name: modal-slide-in-left;
}
@keyframes modal-slide-in-left {
  from { transform: translateX(-20px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.modal .finding-body p {
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--ink);
  margin: 0;
}
.modal .finding-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px dotted var(--line);
}
.modal .finding-meta-chip {
  font-size: 11px;
  padding: 3px 8px;
  background: #f0e8d4;
  color: var(--ink-soft);
  border-radius: 3px;
  letter-spacing: 0.02em;
}
.modal .finding-meta-chip.tentative {
  background: #f5e0c8;
}
</style>

<script type="application/json" id="signs-data">{"signs":[{"photo_id":"KB_01","filename":"KB_01.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":true,"ta":true,"ms":true,"en":true},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"The sign indicates a local shop named \"Klinik Kasut,\" which literally translates to \"Shoe Clinic.\" It is a service establishment dedicated to repairing, restoring, and cleaning shoes.","language_count":4,"representative":true,"caption":"A grassroots commercial signboard of a local shoe repair shop named \"KLINIK KASUT\" (Shoe Clinic) in Kampung Baru. Situated beneath the Malaysian national flag, the sign perfectly aligns four scripts: traditional Jawi, Latin Malay, Tamil, and Simplified Chinese. As an exemplary specimen of bottom-up multilingual linguistic landscape, it demonstrates how private everyday businesses spontaneously transcend official language boundaries, adopting a high-level four-language presentation to maximize inclusivity and reach potential customers across all major ethnic groups in Malaysia.","notes":"the only one has Tamil","caption_i18n":{"zh":"甘榜峇鲁一家名为「KLINIK KASUT」（鞋诊所）的本地修鞋店的草根商业招牌。招牌悬于马来西亚国旗下方，完美对齐四种文字：传统 Jawi、Rumi 马来文、Tamil 和简体华文。作为自下而上多语景观的典范样本，它展示了私营日常商业如何自发跨越官方语言边界，采用最高规格的四语呈现，以最大化包容性并触达马来西亚所有主要族群的潜在顾客。","ms":"Papan tanda komersial akar umbi sebuah kedai pembaikan kasut tempatan bernama \"KLINIK KASUT\" di Kampung Baru. Terletak di bawah bendera kebangsaan Malaysia, papan tanda ini menjajarkan empat skrip dengan sempurna: Jawi tradisional, Rumi Melayu, Tamil, dan Cina Ringkas. Sebagai spesimen contoh lanskap linguistik berbilang bahasa dari bawah ke atas, ia menunjukkan bagaimana perniagaan persendirian harian melangkaui sempadan bahasa rasmi secara spontan, mengamalkan persembahan empat bahasa peringkat tinggi untuk memaksimumkan keterangkuman dan menjangkau bakal pelanggan dari semua kumpulan etnik utama di Malaysia.","ta":"கம்பங் பாருவில் உள்ள \"KLINIK KASUT\" (காலணி சிகிச்சை மையம்) என்ற உள்ளூர் காலணி பழுதுபார்க்கும் கடையின் அடிமட்ட வணிக விளம்பரப் பலகை. மலேசிய தேசியக் கொடியின் கீழ் அமைந்துள்ள இந்தப் பலகை, பாரம்பரிய ஜாவி, லத்தீன் மலாய், தமிழ் மற்றும் எளிமைப்படுத்தப்பட்ட சீனம் ஆகிய நான்கு எழுத்துமுறைகளைத் துல்லியமாக ஒன்றிணைக்கிறது. அடிமட்டத்திலிருந்து உருவாகும் பன்மொழிப் புலமைக்கு ஒரு சிறந்த எடுத்துக்காட்டாக, மலேசியாவின் அனைத்து முக்கிய இனக்குழுக்களையும் உள்ளடக்கிய தன்மையை அதிகரிக்கவும், சாத்தியமான வாடிக்கையாளர்களைச் சென்றடையவும், தனியார் அன்றாட வணிகங்கள் எவ்வாறு தன்னிச்சையாக அதிகாரப்பூர்வ மொழி எல்லைகளைக் கடந்து, ஒரு உயர் மட்ட நான்கு மொழிப் பிரதிநிதித்துவத்தை ஏற்றுக்கொள்கின்றன என்பதை இது நிரூபிக்கிறது.","jawi":"ڤاڤن تندا کومرسيال اکر اومبي سبواه کداي ڤمباءيقن کاسوت تمڤتن برنام \"KLINIK KASUT\" د کامڤوڠ بارو. ترلتق د باوه بنديرا کبڠساءن مليسيا، ڤاڤن تندا اين منجاجرکن امڤت سکريڤ دڠن سمڤورنا: جاوي تراديسيونل، رومي ملايو، تاميل، دان چينا ريڠکس. سباݢاي چونتوه لنسکڤ ليڠݢويستيک بربيلڠ بهاس دري باوه ک اتس، اي منونجوقکن باݢايمان ڤرنياݢاءن ڤرسنديرين هارين ملڠکاهي سمڤادن بهاس راسمي سچارا سڤونتن، مڠعملکن ڤرسمبهن امڤت بهاس ڤريڠکت تيڠݢي اونتوق ممکسيمومکن کترڠکومن دان منجڠکاو باکل ڤلڠݢن دري سموا کومڤولن اتنيک اوتاما د مليسيا."},"notes_i18n":{"zh":"唯一含 Tamil 的招牌。","ms":"Satu-satunya papan tanda yang mengandungi Tamil.","ta":"தமிழ் இருக்கும் ஒரே அடையாளப் பலகை.","jawi":"ساتو-ساتوڽ ڤاڤن تندا يڠ مڠاندوڠي تاميل."},"text_content_i18n":{"zh":"招牌标示一家名为 \"Klinik Kasut\"（字面意为\"鞋类诊所\"）的本地店铺。这是一家专门从事鞋类维修、修复与清洁服务的店面。","ms":"Papan tanda menunjukkan sebuah kedai tempatan bernama \"Klinik Kasut\", yang secara literal bermaksud \"Klinik Kasut\" dalam bahasa Inggeris. Ia adalah sebuah premis perkhidmatan yang mengkhususkan diri dalam membaiki, memulihkan, dan membersihkan kasut.","ta":"\"Klinik Kasut\" (நேரடி அர்த்தம் \"Shoe Clinic\") என்ற பெயரிலான ஓர் உள்ளூர் கடையை இந்தப் பலகை சுட்டிக்காட்டுகிறது. இது காலணிகளை பழுதுபார்த்தல், புதுப்பித்தல், சுத்தம் செய்தல் ஆகியவற்றில் சிறப்புப் பணியாற்றும் ஒரு சேவை நிறுவனமாகும்.","jawi":"ڤاڤن تندا اين منونجوقکن سبواه کداي تمڤتن برنام \"Klinik Kasut\"، يڠ سچارا حرفيه برمقصود \"Shoe Clinic\" دالم بهاس ايڠݢريس. اي اداله سبواه ڤرميس ڤرخدمتن يڠ مڠخوصوسکن ديري دالم ممبائيقي، مموليهکن، دان ممبرسيهکن کاسوت."}},{"photo_id":"KB_02","filename":"KB_02.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":true,"en":false},"other_language":"Arabic","sign_type":"Road Sign","text_content":"This is an official street sign for \"Jalan Raja Alang\" located in Kuala Lumpur with the postcode 50300. It also indicates that the street was formerly known as \"Jalan Perkins\" (Perkins Road).","language_count":1,"representative":true,"caption":"A standard blue municipal street sign erected by the Kuala Lumpur City Hall (DBKL). The signage features traditional Jawi calligraphy at the top, followed by the modern romanized Malay road name \"JALAN RAJA ALANG\" and its postal code, with its historical colonial name \"(JALAN PERKINS)\" appended at the bottom. This official visual marker illustrates how Malaysia’s public language policy balances modern national language standardization with the institutional preservation of Islamic cultural heritage and colonial geographic history.","notes":"Jawi","caption_i18n":{"zh":"由吉隆坡市政厅（DBKL）竖立的标准蓝色市政路牌。顶部为传统 Jawi 书法，下方为现代化 Rumi 马来文路名「JALAN RAJA ALANG」及其邮政编码，底部附有殖民时期的历史名称「(JALAN PERKINS)」。这块官方视觉标识展示了马来西亚公共语言政策如何在现代国语标准化与对伊斯兰文化遗产、殖民地理历史的制度性保存之间取得平衡。","ms":"Papan tanda jalan perbandaran biru standard yang didirikan oleh Dewan Bandaraya Kuala Lumpur (DBKL). Papan tanda ini memaparkan kaligrafi Jawi tradisional di bahagian atas, diikuti dengan nama jalan Rumi moden \"JALAN RAJA ALANG\" dan poskodnya, dengan nama kolonial sejarahnya \"(JALAN PERKINS)\" dilampirkan di bahagian bawah. Penanda visual rasmi ini menggambarkan bagaimana dasar bahasa awam Malaysia mengimbangi penyeragaman bahasa kebangsaan moden dengan pemuliharaan institusi warisan budaya Islam dan sejarah geografi kolonial.","ta":"கோலாலம்பூர் மாநகராட்சி (DBKL) நிறுவிய நிலையான நீல நகராட்சி தெரு அடையாளப் பலகை. மேலே பாரம்பரிய ஜாவி காலிகிராஃபி, அதைத் தொடர்ந்து நவீன ரோமன் மலாய் சாலையின் பெயர் \"JALAN RAJA ALANG\" மற்றும் அதன் தபால் குறியீடு, கீழே அதன் வரலாற்று காலனித்துவ பெயர் \"(JALAN PERKINS)\" இணைக்கப்பட்டுள்ளது. இந்த உத்தியோகபூர்வ காட்சி அடையாளம், மலேசியாவின் பொது மொழிக் கொள்கை எவ்வாறு நவீன தேசிய மொழி தரப்படுத்தலையும், இஸ்லாமிய பண்பாட்டு பாரம்பரியம் மற்றும் காலனித்துவ புவியியல் வரலாற்றின் நிறுவன பாதுகாப்பையும் சமநிலைப்படுத்துகிறது என்பதை விளக்குகிறது.","jawi":"ڤاڤن تندا جالن ڤربندارن بيرو ستندرد يڠ دديريکن اوليه ديوان بندارايا کوالا لومڤور (DBKL). ڤاڤن تندا اين مماڤرکن کاليݢرافي جاوي تراديسيونل د بهاݢين اتس، دايکوتي دڠن نام جالن رومي مودين \"JALAN RAJA ALANG\" دان ڤوسکودڽ، دڠن نام کولونيل سجاره-ڽ \"(JALAN PERKINS)\" دلامڤيرکن د بهاݢين باوه. ڤنندا ۏيسوال راسمي اين مڠݢمبرکن باݢايمان داسر بهاس عوام مليسيا مڠيمبڠي ڤڽرݢمن بهاس کبڠساءن مودين دڠن ڤموليهرأن انستيتوسي وريسن بودايا اسلام دان سجاره ݢأوݢرافي کولونيل."},"notes_i18n":{"zh":"Jawi（爪夷文）。","ms":"Jawi.","ta":"ஜாவி.","jawi":"جاوي."},"text_content_i18n":{"zh":"这是一块位于吉隆坡邮编 50300 的官方街道招牌，标识 \"Jalan Raja Alang\"。同时显示该街道的旧称 \"Jalan Perkins\"（柏金斯路）。","ms":"Ini adalah papan tanda jalan rasmi untuk \"Jalan Raja Alang\" yang terletak di Kuala Lumpur dengan poskod 50300. Ia juga menunjukkan bahawa jalan ini dahulunya dikenali sebagai \"Jalan Perkins\".","ta":"இது கோலாலம்பூரில் 50300 அஞ்சல் குறியீட்டுடன் அமைந்துள்ள \"Jalan Raja Alang\" என்ற அதிகாரப்பூர்வ தெரு அடையாளப் பலகை. இந்தத் தெரு முன்பு \"Jalan Perkins\" என்று அழைக்கப்பட்டதையும் இது குறிப்பிடுகிறது.","jawi":"اين اداله ڤاڤن تندا جالن راسمي اونتوق \"Jalan Raja Alang\" يڠ ترلتق د کوالا لومڤور دڠن ڤوسکود 50300. اي جوݢ منونجوقکن بهاوا جالن اين دهولوڽ دکنلي سباݢاي \"Jalan Perkins\"."}},{"photo_id":"KB_03","filename":"KB_03.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":true,"en":false},"other_language":null,"sign_type":"Other","text_content":"The signs direct users to two facilities: a \"Wudhuk\" area designated for Islamic ritual purification (ablution) and a general \"Toilet\" for men and women.","language_count":1,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"招牌指引使用者前往两个设施：一个供伊斯兰净礼（小净）使用的 \"Wudhuk\" 区，以及男女通用的厕所。","ms":"Papan tanda mengarahkan pengguna ke dua kemudahan: kawasan \"Wudhuk\" yang dikhaskan untuk penyucian ritual Islam (mengambil wuduk) dan tandas umum untuk lelaki dan wanita.","ta":"பலகை இரண்டு வசதிகளை நோக்கிப் பயனாளர்களை வழிநடத்துகிறது: இஸ்லாமிய சடங்கு சுத்திகரிப்புக்கான (உளு) ஒதுக்கப்பட்ட \"Wudhuk\" பகுதி, மற்றும் ஆண்களுக்கும் பெண்களுக்குமான பொதுக் கழிப்பறை.","jawi":"ڤاڤن تندا مڠارهکن ڤڠݢونا کدوا کموداهن: کاوسن \"Wudhuk\" يڠ دخصکن اونتوق ڤڽوچين ريتوال اسلام (مڠمبيل وضوء) دان تنداس عوام اونتوق للاکي دان وانيتا."}},{"photo_id":"KB_04","filename":"KB_04.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Other","text_content":"This is a directional and parking fee sign for the Al Islam Specialist Hospital. It points toward the emergency department and main entrance, while listing parking rates for Parking A, including a flat discount rate for validated patients.","language_count":2,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"这是 Al Islam 专科医院的指引与停车收费招牌。指向急诊部与主入口，并列出 A 区停车场费率，含经认证患者的固定折扣价。","ms":"Ini adalah papan tanda arah dan kadar bayaran tempat letak kereta untuk Hospital Pakar Al Islam. Ia menunjuk ke arah jabatan kecemasan dan pintu masuk utama, serta menyenaraikan kadar tempat letak kereta untuk Parking A, termasuk kadar diskaun rata bagi pesakit yang telah disahkan.","ta":"இது Al Islam சிறப்பு மருத்துவமனைக்கான திசை மற்றும் வாகனத் தரிப்பு கட்டண அடையாளப் பலகை. அவசர சிகிச்சைப் பிரிவையும் முதன்மை நுழைவாயிலையும் சுட்டிக்காட்டுகிறது; உறுதிசெய்யப்பட்ட நோயாளிகளுக்கான தட்டை விலைக் கழிவு உட்பட Parking A இற்கான தரிப்பு விலைகளையும் பட்டியலிடுகிறது.","jawi":"اين اداله ڤاڤن تندا اره دان قدر بايرن تمڤت لتق کريتا اونتوق هوسڤيتل ڤاکر Al Islam. اي منونجوق که اره جابتن کچمسن دان ڤينتو ماسوق اوتاما، سرتا مڽنارايکن قدر تمڤت لتق کريتا اونتوق Parking A، ترماسوق قدر ديسکاون راتا باݢي ڤساکيت يڠ تله دساهکن."}},{"photo_id":"KB_05","filename":"KB_05.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":true,"en":false},"other_language":null,"sign_type":"Government","text_content":"This is a safety warning sign from Tenaga Nasional Berhad (TNB) for an electrical substation located near Masjid Jamek, Kampung Baru. It states that safety is the top priority and strictly prohibits unauthorized entry, supplemented by safety equipment icons at the bottom.","language_count":1,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"这是来自国家能源公司（Tenaga Nasional Berhad, TNB）的安全警示招牌，针对位于甘榜峇鲁 Masjid Jamek 附近的一处变电站。招牌声明安全为首要任务，严禁未经授权人员进入，下方辅以安全设备图标。","ms":"Ini adalah papan tanda amaran keselamatan daripada Tenaga Nasional Berhad (TNB) untuk pencawang elektrik yang terletak berhampiran Masjid Jamek, Kampung Baru. Papan tanda menyatakan bahawa keselamatan adalah keutamaan dan melarang sama sekali kemasukan tanpa kebenaran, dilengkapi dengan ikon peralatan keselamatan di bahagian bawah.","ta":"இது கம்போங் பாரு, மஸ்ஜித் ஜாமேக் அருகே அமைந்துள்ள மின் துணை நிலையத்திற்கான Tenaga Nasional Berhad (TNB) நிறுவனத்தின் பாதுகாப்பு எச்சரிக்கைப் பலகை. பாதுகாப்பு முதன்மையானது என்பதைக் குறிப்பிட்டு, அனுமதியின்றி நுழைவதை கண்டிப்பாக தடைசெய்கிறது; கீழ்ப்பகுதியில் பாதுகாப்பு உபகரண சின்னங்கள் இடம்பெற்றுள்ளன.","jawi":"اين اداله ڤاڤن تندا امرن کسلامتن درڤد Tenaga Nasional Berhad (TNB) اونتوق ڤنچاوڠ ايليکتريک يڠ ترلتق برهمڤيرن مسجد جامع، کامڤوڠ بارو. ڤاڤن تندا مڽاتاکن بهاوا کسلامتن اداله کأوتامأن دان ملارڠ سام سکالي کماسوقن تنڤ کبنرن، دلڠکڤي دڠن ايکون ڤرالتن کسلامتن د بهاݢين باوه."}},{"photo_id":"KB_06","filename":"KB_06.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":true,"en":false},"other_language":"Arabic","sign_type":"Religious/Temple/Mosque","text_content":"The decorative tiled sign marks the entrance or boundary of the \"Masjid Jamek Kg. Baru\" located in Kuala Lumpur. It displays the mosque's name in both elegant Jawi calligraphy and standard Latin script.","language_count":1,"representative":false,"caption":null,"notes":"Jawi","notes_i18n":{"zh":"Jawi（爪夷文）。","ms":"Jawi.","ta":"ஜாவி.","jawi":"جاوي."},"text_content_i18n":{"zh":"这块装饰瓷砖招牌标示位于吉隆坡的 \"Masjid Jamek Kg. Baru\"（甘榜峇鲁占美清真寺）的入口或边界。同时以优雅的爪夷文书法与标准拉丁文显示清真寺名。","ms":"Papan tanda berhias jubin menandakan pintu masuk atau sempadan \"Masjid Jamek Kg. Baru\" yang terletak di Kuala Lumpur. Ia memaparkan nama masjid dalam khat Jawi yang anggun serta tulisan Rumi standard.","ta":"அலங்கார ஓடுகளால் அமைந்த இந்தப் பலகை, கோலாலம்பூரில் அமைந்துள்ள \"Masjid Jamek Kg. Baru\" (கம்போங் பாரு ஜாமேக் மஸ்ஜித்) நுழைவாயில் அல்லது எல்லையைக் குறிக்கிறது. மசூதியின் பெயரை அழகான ஜாவி எழுத்திலும் நிலையான ரூமி எழுத்திலும் காட்டுகிறது.","jawi":"ڤاڤن تندا برهياس جوبين منندکن ڤينتو ماسوق اتاو سمڤادن \"Masjid Jamek Kg. Baru\" يڠ ترلتق د کوالا لومڤور. اي مماڤرکن نام مسجد دالم خط جاوي يڠ اڠݢون سرتا توليسن رومي ستندرد."}},{"photo_id":"KB_07","filename":"KB_07.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":false,"en":true},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"The sign marks an educational facility named \"NEXTCALIPH NATURE CHILDCARE CENTRE.\" It is a childcare establishment that appears to focus on a nature-inspired theme or curriculum.","language_count":1,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"招牌标示一家名为 \"NEXTCALIPH NATURE CHILDCARE CENTRE\" 的教育机构。该机构是一所以自然为主题或课程的托儿中心。","ms":"Papan tanda menandakan sebuah kemudahan pendidikan bernama \"NEXTCALIPH NATURE CHILDCARE CENTRE\". Ia adalah pusat penjagaan kanak-kanak yang nampaknya menumpukan pada tema atau kurikulum berinspirasikan alam semula jadi.","ta":"\"NEXTCALIPH NATURE CHILDCARE CENTRE\" என்ற பெயரிலான கல்வி வசதியை இந்தப் பலகை குறிக்கிறது. இது இயற்கை-உத்வேக கருப்பொருள் அல்லது பாடத்திட்டத்தை மையமாகக் கொண்ட குழந்தைப் பராமரிப்பு நிலையமாகும்.","jawi":"ڤاڤن تندا منندکن سبواه کموداهن ڤنديديقن برنام \"NEXTCALIPH NATURE CHILDCARE CENTRE\". اي اداله ڤوست ڤنجاݢأن کانق-کانق يڠ نمڤقڽ منومڤوکن ڤد تيما اتاو کوريکولوم برانسڤيراسيکن عالم سمولاجادي."}},{"photo_id":"KB_08","filename":"KB_08.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":true,"en":false},"other_language":null,"sign_type":"Government","text_content":"The signs identify the glass-facade building as \"Wisma YWP,\" which serves as the headquarters for \"Yayasan Wilayah Persekutuan\" (Federal Territories Foundation). Flags of Malaysia, the Federal Territories, and the foundation are flying at the entrance.","language_count":1,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"招牌将这栋玻璃外墙建筑标识为 \"Wisma YWP\"，该楼为 \"Yayasan Wilayah Persekutuan\"（联邦直辖区基金会）的总部。入口处飘扬着马来西亚、联邦直辖区与基金会的三面旗帜。","ms":"Papan tanda mengenal pasti bangunan berfasad kaca ini sebagai \"Wisma YWP\", yang berfungsi sebagai ibu pejabat \"Yayasan Wilayah Persekutuan\". Bendera Malaysia, Wilayah Persekutuan, dan yayasan tersebut berkibar di pintu masuk.","ta":"கண்ணாடி முகப்புக் கொண்ட இந்தக் கட்டிடத்தை \"Wisma YWP\" என இந்தப் பலகைகள் அடையாளம் காட்டுகின்றன; இது \"Yayasan Wilayah Persekutuan\" (கூட்டாட்சி பிரதேச அறக்கட்டளை) நிறுவனத்தின் தலைமையகமாக செயல்படுகிறது. நுழைவாயிலில் மலேசிய, கூட்டாட்சி பிரதேச, மற்றும் அறக்கட்டளையின் கொடிகள் பறக்கின்றன.","jawi":"ڤاڤن تندا مڠنل ڤستي باڠونن برفساد کاچ اين سباݢاي \"Wisma YWP\"، يڠ برفوڠسي سباݢاي ايبو ڤجابت \"Yayasan Wilayah Persekutuan\". بنديرا مليسيا، ولايه ڤرسکوتوان، دان يايسن ترسبوت برکيبر د ڤينتو ماسوق."}},{"photo_id":"KB_09","filename":"KB_09.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":true,"en":true},"other_language":"Arabic","sign_type":"Shop/Restaurant","text_content":"The sign belongs to a local food and beverage stall named \"Warung Roszaid,\" which is sponsored by the Extra Joss energy drink brand. It highlights their culinary offerings, specifically serving Nasi Campur (mixed rice) and freshly cooked hot dishes.","language_count":2,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"这块招牌属于一家名为 \"Warung Roszaid\" 的本地餐饮摊位，由 Extra Joss 能量饮料品牌赞助。重点宣传其菜品，专门提供 Nasi Campur（杂菜饭）与新鲜现做的热菜。","ms":"Papan tanda ini milik sebuah warung makanan dan minuman tempatan bernama \"Warung Roszaid\", yang ditaja oleh jenama minuman tenaga Extra Joss. Ia menyerlahkan tawaran makanannya, khususnya menyajikan Nasi Campur dan hidangan panas yang dimasak segar.","ta":"\"Warung Roszaid\" என்ற பெயரிலான உள்ளூர் உணவு மற்றும் பானக் கடைக்கு உரியது இந்தப் பலகை; Extra Joss சக்திப் பானம் இதனை வழங்குபவராக உள்ளது. நசீ சம்பூர் (கலப்பு சாதம்) மற்றும் புதிதாகச் சமைக்கப்பட்ட சூடான உணவுகளை சிறப்பாக வழங்கும் தனது சமையல் வகைகளை இது வெளிப்படுத்துகிறது.","jawi":"ڤاڤن تندا اين ميليق سبواه واروڠ ماکنن دان مينومن تمڤتن برنام \"Warung Roszaid\"، يڠ دتاج اوليه جنام مينومن تناݢ Extra Joss. اي مڽرلهکن تاورن ماکننڽ، خصوصڽ مڽاجيکن نسي چمڤور دان هيدڠن ڤانس يڠ دماسق سݢر."}},{"photo_id":"KB_10","filename":"KB_10.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Government","text_content":"The notice from the Kuala Lumpur City Hall (DBKL) announces a trial one-way traffic system implementation for Jalan Daud and Lorong Raja Mahmud starting from March 15, 2017. It includes a route map (\"Peta Laluan\") and provides a telephone number and email address for public inquiries or objections.","language_count":2,"representative":true,"caption":"An official yellow traffic notice board issued by the Kuala Lumpur City Hall (DBKL) regarding a trial one-way routing scheme, set against a backdrop of modern high-rise buildings. Written entirely in the formal, administrative register of the national language (Malay), the notice details a traffic experiment starting March 15, 2017, complemented by a simplified route map grid (Peta Laluan). This signage exemplifies the absolute dominance of official state language in urban public management, while establishing a striking visual contrast between the rustic community notice and the rapidly gentrifying urban landscape.","notes":null,"caption_i18n":{"zh":"由吉隆坡市政厅（DBKL）发布的官方黄色交通通告板，关于一项试行单向通行方案，背景为现代化高层建筑。通告完全以国语（马来文）的正式行政语域撰写，详述了 2017 年 3 月 15 日起的交通试验，并配有简化的路线图网格（Peta Laluan）。这块招牌体现了官方国家语言在城市公共管理中的绝对主导地位，同时在素朴的社区公告与快速绅士化的城市景观之间形成鲜明的视觉对比。","ms":"Papan notis lalu lintas kuning rasmi yang dikeluarkan oleh Dewan Bandaraya Kuala Lumpur (DBKL) berhubung skim laluan sehala percubaan, dilatari bangunan pencakar langit moden. Ditulis sepenuhnya dalam laras formal dan pentadbiran bahasa kebangsaan (Melayu), notis ini memperincikan eksperimen lalu lintas yang bermula pada 15 Mac 2017, dilengkapi dengan grid peta laluan ringkas (Peta Laluan). Papan tanda ini mencontohkan dominasi mutlak bahasa rasmi negara dalam pengurusan awam bandar, sekali gus mewujudkan kontras visual yang mencolok antara notis komuniti yang sederhana dengan landskap bandar yang pesat menjalani gentrifikasi.","ta":"நவீன உயரமான கட்டிடங்களின் பின்னணியில், ஒரு சோதனை ஒருவழிப் பாதை திட்டம் தொடர்பாக கோலாலம்பூர் மாநகராட்சியால் (DBKL) வெளியிடப்பட்ட அதிகாரப்பூர்வ மஞ்சள் போக்குவரத்து அறிவிப்புப் பலகை ஒன்று உள்ளது. தேசிய மொழியான மலாய் மொழியின் முறையான, நிர்வாக நடையில் முழுமையாக எழுதப்பட்ட இந்த அறிவிப்பு, மார்ச் 15, 2017 அன்று தொடங்கும் ஒரு போக்குவரத்துச் சோதனையை விவரிக்கிறது; இது எளிமைப்படுத்தப்பட்ட வழித்தட வரைபடக் கட்டத்துடன் (பெட்டா லலுவான்) இணைக்கப்பட்டுள்ளது. இந்த அறிவிப்புப் பலகையானது, நகர்ப்புற பொது நிர்வாகத்தில் அதிகாரப்பூர்வ அரசு மொழியின் முழுமையான ஆதிக்கத்திற்கு ஒரு எடுத்துக்காட்டாக விளங்குவதோடு, கிராமப்புற சமூக அறிவிப்பிற்கும் வேகமாக நாகரிகமடைந்து வரும் நகர்ப்புற நிலப்பரப்பிற்கும் இடையே ஒரு குறிப்பிடத்தக்க காட்சி வேறுபாட்டையும் ஏற்படுத்துகிறது.","jawi":"ڤاڤن نوتيس لالو لينتس کونيڠ راسمي يڠ دکلوارکن اوليه ديوان Bandaraya کوالا لومڤور (DBKL) برهوبوڠ سکيم لالوان سهالا ڤرچوباءن، دلاتري باڠونن ڤنچاکر لاڠيت مودن. دتوليس سڤنوهڽ دالم لارس فورمل دان ڤنتدبيرن بهاس کبڠساءن (ملايو)، نوتيس اين ممڤرينچيکن ايکسڤيريمن لالو لينتس يڠ برمولا ڤد 15 مچ 2017، دلڠکڤي دڠن ݢريد ڤتا لالوان ريڠکس (ڤتا لالوان). ڤاڤن تندا اين منچونتوهکن دوميناسي مطلق بهاس راسمي نݢارا دالم ڤڠوروسن عوام باندر، سکالي ݢوس موجودکن کونترس ۏيسوال يڠ منچولوق انتارا نوتيس کومونيتي يڠ سدرهان دڠن لنسکڤ باندر يڠ ڤست منجالني gentrifikasi."},"text_content_i18n":{"zh":"由吉隆坡市政厅（DBKL）发布的通告，宣布自 2017 年 3 月 15 日起对 Jalan Daud 与 Lorong Raja Mahmud 实施试行单向交通系统。通告包含路线图（\"Peta Laluan\"），并提供电话与电子邮件地址供公众咨询或反对。","ms":"Notis daripada Dewan Bandaraya Kuala Lumpur (DBKL) mengumumkan pelaksanaan sistem lalu lintas sehala secara percubaan untuk Jalan Daud dan Lorong Raja Mahmud bermula 15 Mac 2017. Ia merangkumi peta laluan (\"Peta Laluan\") dan menyediakan nombor telefon serta alamat e-mel untuk pertanyaan atau bantahan orang awam.","ta":"கோலாலம்பூர் மாநகராட்சி (DBKL) வெளியிட்ட அறிவிப்பு, 2017 மார்ச் 15 முதல் Jalan Daud மற்றும் Lorong Raja Mahmud இற்கான பரிசோதனை ஒருவழிப் போக்குவரத்து முறையை அறிவிக்கிறது. வழிபடம் (\"Peta Laluan\") உள்ளடக்கப்பட்டுள்ளது; பொதுமக்களின் கேள்விகளுக்கோ எதிர்ப்புகளுக்கோ தொலைபேசி எண்ணும் மின்னஞ்சல் முகவரியும் வழங்கப்பட்டுள்ளன.","jawi":"نوتيس درڤد ديوان Bandaraya کوالا لومڤور (DBKL) مڠومومکن ڤلقسانأن سيستم لالو لينتس سهالا سچارا ڤرچوباءن اونتوق Jalan Daud دان Lorong Raja Mahmud برمولا 15 مچ 2017. اي مرڠکومي ڤتا لالوان (\"Peta Laluan\") دان مڽدياکن نومبور تيليفون سرتا الامت اي-ميل اونتوق ڤرتاڽاءن اتاو بنتاهن اورڠ عوام."}},{"photo_id":"KB_11","filename":"KB_11.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Government","text_content":"The sign introduces Tn Hj Abdul Ahad Bin Hj Abu Bakar as the representative for Kampong Masjid under the Malay Agricultural Settlement (M.A.S Kampong Bharu) administrative board, which was established on January 12, 1900. It provides his contact number and email address for official communication.","language_count":2,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"招牌介绍 Tn Hj Abdul Ahad Bin Hj Abu Bakar 为 \"马来农业聚居地（M.A.S Kampong Bharu）\" 行政委员会下 Kampong Masjid 的代表，该委员会成立于 1900 年 1 月 12 日。提供他的联系电话与电子邮件地址供官方联络。","ms":"Papan tanda memperkenalkan Tn Hj Abdul Ahad Bin Hj Abu Bakar sebagai wakil bagi Kampong Masjid di bawah lembaga pentadbiran Malay Agricultural Settlement (M.A.S Kampong Bharu) yang ditubuhkan pada 12 Januari 1900. Ia menyediakan nombor telefon dan alamat e-mel beliau untuk komunikasi rasmi.","ta":"1900 ஜனவரி 12 அன்று நிறுவப்பட்ட Malay Agricultural Settlement (M.A.S Kampong Bharu) நிர்வாக வாரியத்தின் கீழ் Kampong Masjid இற்கான பிரதிநிதியாக Tn Hj Abdul Ahad Bin Hj Abu Bakar அவர்களை இந்தப் பலகை அறிமுகப்படுத்துகிறது. அதிகாரப்பூர்வ தொடர்புக்காக அவரது தொலைபேசி எண்ணும் மின்னஞ்சல் முகவரியும் வழங்கப்பட்டுள்ளன.","jawi":"ڤاڤن تندا مڤرکنلکن Tn Hj Abdul Ahad Bin Hj Abu Bakar سباݢاي واکيل باݢي Kampong Masjid د باوه لمباݢا ڤنتدبيرن Malay Agricultural Settlement (M.A.S Kampong Bharu) يڠ دتوبوهکن ڤد 12 جانواري 1900. اي مڽدياکن نومبور تيليفون دان الامت اي-ميل بلياو اونتوق کوميکاسي راسمي."}},{"photo_id":"KB_12","filename":"KB_12.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Notice/Poster","text_content":"The sign serves as a security warning stating that the area is under closed-circuit television (CCTV) surveillance. It informs the public in three languages that cameras are actively operating in the vicinity.","language_count":3,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"招牌作为安保警示，声明该区域处于闭路电视（CCTV）监控之下。以三种语言告知公众附近正有摄像头运作。","ms":"Papan tanda berfungsi sebagai amaran keselamatan yang menyatakan bahawa kawasan tersebut berada di bawah pengawasan litar tertutup televisyen (CCTV). Ia memaklumkan kepada orang awam dalam tiga bahasa bahawa kamera sedang beroperasi aktif di kawasan berdekatan.","ta":"மூடிய மின்னி தொலைக்காட்சி (CCTV) கண்காணிப்பின் கீழ் இப்பகுதி உள்ளது என்பதை அறிவிக்கும் பாதுகாப்பு எச்சரிக்கைப் பலகை இது. அருகாமையில் கேமராக்கள் தீவிரமாக செயல்பட்டுக் கொண்டிருப்பதை மூன்று மொழிகளில் பொதுமக்களுக்குத் தெரிவிக்கிறது.","jawi":"ڤاڤن تندا برفوڠسي سباݢاي امرن کسلامتن يڠ مڽاتاکن بهاوا کاوسن ترسبوت برادا د باوه ڤڠاوسن ليتر تترتوتوڤ تيليۏيشن (CCTV). اي ممعلومکن کڤد اورڠ عوام دالم تيݢ بهاس بهاوا کاميرا سداڠ برأوڤراسي اکتيف د کاوسن بردکتن."}},{"photo_id":"KB_13","filename":"KB_13.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Notice/Poster","text_content":"The sign features a standard universal \"No Parking\" symbol (a letter 'P' inside a red circle with a slash). Below the graphic, it delivers a strict command prohibiting parking in three different languages to ensure all drivers understand.","language_count":3,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"招牌采用标准通用的\"禁止停车\"符号（红圈内带斜杠的字母 \"P\"）。图标下方以三种不同语言下达严格禁停命令，以确保所有驾驶者理解。","ms":"Papan tanda menampilkan simbol universal standard \"Dilarang Letak Kereta\" (huruf \"P\" di dalam bulatan merah dengan garis miring). Di bawah grafik tersebut, ia menyampaikan arahan ketat melarang meletak kereta dalam tiga bahasa berbeza untuk memastikan semua pemandu memahaminya.","ta":"\"வாகனம் நிறுத்த தடை\" என்ற நிலையான பொதுவான குறியீட்டை (சாய்வுக் கோடுடன் சிவப்பு வட்டத்தினுள் \"P\" எழுத்து) இந்தப் பலகை கொண்டிருக்கிறது. வரைபடத்திற்குக் கீழே, அனைத்து வாகன ஓட்டுநர்களும் புரிந்துகொள்ளும்படி மூன்று வெவ்வேறு மொழிகளில் வாகனம் நிறுத்துவதைத் தடைசெய்யும் கடுமையான கட்டளையை இது வழங்குகிறது.","jawi":"ڤاڤن تندا منمڤيلکن سيمبول اونيۏرسل ستندرد \"ديلارڠ لتق کريتا\" (هوروف \"P\" د دالم بولاتن ميره دڠن ݢاريس ميريڠ). د باوه ݢرافيک ترسبوت، اي مڽمڤايکن اراهن کتت ملارڠ ملتق کريتا دالم تيݢ بهاس برباز اونتوق ممستيکن سموا ڤماندو ممهاميڽ."}},{"photo_id":"KB_14","filename":"KB_14.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Notice/Poster","text_content":"The sign outlines a 3-step instruction guide for using a self-service washing machine (\"WASHER\"). It instructs users to load laundry and secure the door, select a washing temperature program (P1 to P3), and finally insert a token to start the machine. The large decorative landmark sign marks the entrance or a prominent structure of \"Kampong Bharu\" (Kampung Baru) in Kuala Lumpur. It displays the historic Malay enclave's name using both elegant traditional Jawi calligraphy and Latin script against an intricate geometric latticework background.","language_count":3,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"招牌列出使用自助洗衣机（\"WASHER\"）的三步操作指南：装入衣物并关好门、选择洗涤温度程序（P1 至 P3）、最后投入代币启动机器。大型装饰性地标招牌标示位于吉隆坡的 \"Kampong Bharu\"（甘榜峇鲁）入口或显著建筑。它以优雅的爪夷书法及拉丁文字在繁复的几何格状背景上展示这一历史性马来族聚居地的名字。","ms":"Papan tanda menggariskan panduan arahan 3 langkah untuk menggunakan mesin basuh layan diri (\"WASHER\"). Ia mengarahkan pengguna untuk memasukkan pakaian dan menutup pintu, memilih program suhu basuhan (P1 hingga P3), dan akhirnya memasukkan token untuk memulakan mesin. Papan tanda mercu tanda hiasan besar menandakan pintu masuk atau struktur menonjol \"Kampong Bharu\" (Kampung Baru) di Kuala Lumpur. Ia memaparkan nama enklaf bersejarah Melayu menggunakan khat Jawi tradisional yang anggun serta tulisan Rumi terhadap latar belakang kekisi geometri yang rumit.","ta":"சுய-சேவை சலவை இயந்திரத்தை (\"WASHER\") பயன்படுத்த 3-படி வழிகாட்டியை இந்தப் பலகை விளக்குகிறது. பயனாளர்களை துணிமணிகளை ஏற்றி கதவை சாத்தச் சொல்கிறது; சலவை வெப்பநிலை திட்டத்தை (P1 முதல் P3 வரை) தேர்ந்தெடுக்க அறிவுறுத்துகிறது; இறுதியில் இயந்திரத்தைத் தொடங்க டோக்கனை செருகச் சொல்கிறது. பெரிய அலங்கார அடையாளப் பலகை, கோலாலம்பூரில் உள்ள \"Kampong Bharu\" (கம்போங் பாரு) நுழைவாயிலை அல்லது முக்கிய கட்டுமானத்தைக் குறிக்கிறது. வளமான வடிவியல் கட்டப் பின்னணியில் அழகான பாரம்பரிய ஜாவி எழுத்திலும் ரூமி எழுத்திலும் இந்த வரலாற்று மலாய் சமூகத்தின் பெயரைக் காட்டுகிறது.","jawi":"ڤاڤن تندا مڠݢاريسکن ڤندوان اراهن 3 لڠکه اونتوق مڠݢوناکن ميسين باسوه ليان ديري (\"WASHER\"). اي مڠارهکن ڤڠݢونا اونتوق مماسوقکن ڤاکاين دان منوتوڤ ڤينتو، مميليه ڤروݢرام سوهو باسوهن (P1 هيڠݢ P3)، دان اخيرڽ مماسوقکن توکن اونتوق ممولاکن ميسين. ڤاڤن تندا مرچو تندا هياسن بسر منندکن ڤينتو ماسوق اتاو ستروکتور منونجول \"Kampong Bharu\" (کامڤوڠ بارو) د کوالا لومڤور. اي مماڤرکن نام انکلاف برسجاره ملايو مڠݢوناکن خط جاوي تراديسيونل يڠ اڠݢون سرتا توليسن رومي ترهادڤ لاتر بلاکڠ ککيسي ݢيومتري يڠ روميت."}},{"photo_id":"KB_15","filename":"KB_15.jpg","district":"KB","district_name":"Kampung Baru","languages":{"zh":false,"ta":false,"ms":true,"en":false},"other_language":null,"sign_type":"Government","text_content":"This is an official institutional school gate sign identifying the \"Kampung Baharu Special Education Primary School,\" providing its complete municipal address, postal code, phone number, and official email under the Ministry of Education.","language_count":1,"representative":false,"caption":null,"notes":null,"text_content_i18n":{"zh":"这是官方机构性校门招牌，标识\"甘榜峇鲁特殊教育小学\"，提供完整的市政地址、邮编、电话号码与教育部所属的官方电子邮件。","ms":"Ini adalah papan tanda pintu pagar sekolah institusi rasmi yang mengenal pasti \"Sekolah Kebangsaan Pendidikan Khas Kampung Baharu\", menyediakan alamat perbandaran lengkap, poskod, nombor telefon, dan alamat e-mel rasmi di bawah Kementerian Pendidikan.","ta":"இது \"Kampung Baharu சிறப்புக் கல்விக்கான தொடக்கப் பள்ளி\" என்பதை அடையாளப்படுத்தும் அதிகாரப்பூர்வ நிறுவன பள்ளி வாயில் அடையாளப் பலகை. கல்வி அமைச்சகத்தின் கீழ் முழுமையான நகர்ப்புற முகவரி, அஞ்சல் குறியீடு, தொலைபேசி எண், மற்றும் அதிகாரப்பூர்வ மின்னஞ்சல் முகவரியை வழங்குகிறது.","jawi":"اين اداله ڤاڤن تندا ڤينتو ڤاݢر سکوله انستيتوسي راسمي يڠ مڠنل ڤستي \"Sekolah Kebangsaan Pendidikan Khas Kampung Baharu\"، مڽدياکن الامت ڤربنداران لڠکڤ، ڤوسکود، نومبور تيليفون، دان الامت اي-ميل راسمي د باوه کمنترين ڤنديديقن."}},{"photo_id":"PS_01","filename":"PS_01.jpg","district":"PS","district_name":"Petaling Street","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"Displays gold text for 'SAUDAGAR TEH' and 'KONG WOOI FONG TEA MERCHANTS SDN BHD' with Chinese text underneath. A side lightbox shows the 'KWF' logo and 'Since 1928'.","language_count":3,"representative":false,"caption":null,"notes":"Highlights the establishment year 1928 and carries the standard Malaysian corporate designation indicator.","notes_i18n":{"zh":"突出标示创立年份 1928，并附马来西亚标准企业称谓后缀。","ms":"Menonjolkan tahun penubuhan 1928 dan membawa penunjuk gelaran korporat Malaysia yang standard.","ta":"நிறுவப்பட்ட ஆண்டான 1928-ஐ சிறப்பித்துக் காட்டுவதோடு, நிலையான மலேசிய நிறுவனப் பெயர் அடையாளக் குறியீட்டையும் கொண்டுள்ளது.","jawi":"منونجولکن تاهون ڤنوبوهن 1928 دان ممباوا ڤنونجوق ݢلرن کورڤورت مليسيا يڠ ستندرد."},"text_content_i18n":{"zh":"黄金字体显示 \"SAUDAGAR TEH\" 与 \"KONG WOOI FONG TEA MERCHANTS SDN BHD\"，下方为中文文字。侧面灯箱显示 \"KWF\" 标志与 \"Since 1928\"。","ms":"Memaparkan teks emas untuk \"SAUDAGAR TEH\" dan \"KONG WOOI FONG TEA MERCHANTS SDN BHD\" dengan teks Cina di bawahnya. Sebuah kotak lampu sisi menunjukkan logo \"KWF\" dan \"Since 1928\".","ta":"\"SAUDAGAR TEH\" மற்றும் \"KONG WOOI FONG TEA MERCHANTS SDN BHD\" என்பவற்றுக்கான தங்க உரையும், அதன் கீழே சீன உரையும் காட்டப்படுகின்றன. பக்க விளக்குப் பெட்டியில் \"KWF\" சின்னமும் \"Since 1928\" என்பதும் காட்டப்படுகின்றன.","jawi":"مماڤرکن تيکس امس اونتوق \"SAUDAGAR TEH\" دان \"KONG WOOI FONG TEA MERCHANTS SDN BHD\" دڠن تيکس چينا د باوهڽ. سبواه کوتق لمڤو سيسي منونجوقکن لوݢو \"KWF\" دان \"Since 1928\"."}},{"photo_id":"PS_02","filename":"PS_02.jpg","district":"PS","district_name":"Petaling Street","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Road Sign","text_content":"\"Jalan Sang Guna, A Street of Many Names, Drury Lane,","language_c کن ݢابوڠن بربيلڠ بهاس يڠ ڤلباݢاي ترماسوق بهاس ملايو، سکريڤ جاوي، چينا، دان ايڠݢريس مرنتس هادڤن باڠونن."},"notes_i18n":{"zh":"右墙附有「斧标驱风油」（Axe Brand）商业侧招，左下方设有街区告示板。","ms":"Memaparkan papan tanda sisi komersial Axe Brand minyak ubat pada dinding kanan dan papan notis jalan di sebelah kiri bawah.","ta":"வலது சுவரில் Axe Brand மருந்து எண்ணெய்க்கான பக்கப் பலகையும், இடது கீழ் பகுதியில் தெரு அறிவிப்புப் பலகையும் இடம்பெற்றுள்ளன.","jawi":"مماڤرکن ڤاڤن تندا سيسي کومرسيال Axe Brand ميڽق اوبت ڤد دينديڠ کانن دان ڤاڤن نوتيس جالن د سبله کيري باوه."},"text_content_i18n":{"zh":"上方外墙显示 \"Kedai Ubat Kien Fatt\"。下方部分有爪夷文字、中文字符与英文 \"Kien Fatt Medical Store\"，外加一块 Axe Brand（斧标）侧面招牌。","ms":"Memaparkan \"Kedai Ubat Kien Fatt\" pada fasad atas. Bahagian bawah menampilkan tulisan Jawi, aksara Cina, dan \"Kien Fatt Medical Store\" dalam bahasa Inggeris, bersama-sama dengan papan tanda sisi jenama Axe Brand.","ta":"மேல் முகப்பில் \"Kedai Ubat Kien Fatt\" காட்டப்படுகிறது. கீழ்ப்பகுதியில் ஜாவி எழுத்து, சீன எழுத்துகள், மற்றும் ஆங்கிலத்தில் \"Kien Fatt Medical Store\" எனவும், Axe Brand பக்கப் பலகையுடனும் இடம்பெற்றுள்ளன.","jawi":"مماڤرکن \"Kedai Ubat Kien Fatt\" ڤد فساد اتس. بهاݢين باوه منمڤيلکن توليسن جاوي، اکسارا چينا، دان \"Kien Fatt Medical Store\" دالم بهاس ايڠݢريس، برسام-سام دڠن ڤاڤن تندا سيسي جنام Axe Brand."}},{"photo_id":"PS_11","filename":"PS_11.jpg","district":"PS","district_name":"Petaling Street","languages":{"zh":false,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Advertisement","text_content":"Displays 'HOTEL BAJET' on top, 'BIRDNEST collective cafe & guesthouse' in the center, and Malay ownership text with a registration number at the bottom.","language_count":2,"representative":false,"caption":null,"notes":"Features the official corporate ownership details and the business registration number alongside the mandatory budget hotel classification text.","notes_i18n":{"zh":"标注官方企业所有权信息、营业注册编号及强制性的经济型酒店分级文字。","ms":"Memaparkan butiran pemilikan korporat rasmi dan nombor pendaftaran perniagaan bersama teks pengelasan hotel bajet yang diwajibkan.","ta":"உத்தியோகபூர்வ நிறுவன உரிமை விவரங்களும் வணிகப் பதிவெண்ணும், கட்டாயமான பட்ஜெட் ஹோட்டல் வகைப்பாட்டு உரையும் இடம்பெற்றுள்ளன.","jawi":"مماڤرکن بوتيرن ڤميليقن کورڤورت راسمي دان نومبور ڤندفترن ڤرنياݢاءن برسام تيکس ڤڠلاسن هوتيل بجيت يڠ دواجبکن."},"text_content_i18n":{"zh":"上方显示 \"HOTEL BAJET\"，中部为 \"BIRDNEST collective cafe & guesthouse\"，底部为附注册号的马来文产权信息。","ms":"Memaparkan \"HOTEL BAJET\" di bahagian atas, \"BIRDNEST collective cafe & guesthouse\" di tengah, dan teks pemilikan dalam bahasa Melayu dengan nombor pendaftaran di bahagian bawah.","ta":"மேலே \"HOTEL BAJET\", மையத்தில் \"BIRDNEST collective cafe & guesthouse\", மற்றும் கீழே பதிவு எண்ணுடன் கூடிய மலாய் உரிமை உரை எனக் காட்டப்படுகிறது.","jawi":"مماڤرکن \"HOTEL BAJET\" د بهاݢين اتس، \"BIRDNEST collective cafe & guesthouse\" د تڠه، دان تيکس ڤميليقن دالم بهاس ملايو دڠن نومبور ڤنداڤترن د بهاݢين باوه."}},{"photo_id":"PS_12","filename":"PS_12.jpg","district":"PS","district_name":"Petaling Street","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Advertisement","text_content":"Hanging boards feature promotional text in Malay, English, and Chinese regarding freshness on the left, and beef noodle menu items in English and Chinese with RM15 pricing on the right.","language_count":3,"representative":true,"caption":"View of hanging multilingual food stall signs decorated with string lights, featuring promotional phrases and menu options in Malay, English, and Chinese.","notes":"Features food pricing details in Malaysian Ringgit (RM) alongside slogans highlighting freshness and recommendations.","caption_i18n":{"zh":"悬挂的多语美食摊招牌视图，配以串灯装饰，呈现马来文、英文、华文的促销语句与菜单选项。","ms":"Pandangan papan tanda gerai makanan berbilang bahasa yang tergantung dihiasi lampu pelita, memaparkan frasa promosi dan pilihan menu dalam bahasa Melayu, Inggeris, dan Cina.","ta":"சரம் விளக்குகளால் அலங்கரிக்கப்பட்டு தொங்கவிடப்பட்ட பன்மொழி உணவுக் கடை அடையாளப் பலகைகளின் காட்சி; மலாய், ஆங்கிலம் மற்றும் சீன மொழிகளில் விளம்பர சொற்றொடர்களும் பட்டியல் தேர்வுகளும் இடம்பெற்றுள்ளன.","jawi":"ڤندڠن ڤاڤن تندا ݢراي ماکنن بربيلڠ بهاس يڠ ترݢنتوڠ دهياسي لمڤو ڤليتا، مماڤرکن فراسا ڤروموسي دان ڤيليهن مينو دالم بهاس ملايو، ايڠݢريس، دان چينا."},"notes_i18n":{"zh":"以马来西亚林吉特（RM）标注食物价格，并配有强调新鲜与推荐的促销语句。","ms":"Memaparkan butiran harga makanan dalam Ringgit Malaysia (RM) bersama cogan kata yang menonjolkan kesegaran dan saranan.","ta":"மலேசிய ரிங்கிட்டில் (RM) உணவின் விலை விவரங்கள், புத்தம் புது தன்மை மற்றும் சிபாரிசுகளை எடுத்துக்காட்டும் விளம்பர வாசகங்களுடன் இடம்பெற்றுள்ளன.","jawi":"مماڤرکن بوتيرن هرݢ ماکنن دالم ريڠݢيت مليسيا (RM) برسام چوݢن کات يڠ منونجولکن کسݢرن دان سرنن."},"text_content_i18n":{"zh":"悬挂招牌左侧以马来文、英文与中文展示有关新鲜度的宣传文字；右侧以英文与中文展示牛肉面菜单，标价 RM15。","ms":"Papan gantung menampilkan teks promosi dalam bahasa Melayu, Inggeris, dan Cina mengenai kesegaran di sebelah kiri, dan item menu mi daging dalam bahasa Inggeris dan Cina dengan harga RM15 di sebelah kanan.","ta":"தொங்கும் பலகைகள் இடதுபுறத்தில் மலாய், ஆங்கிலம் மற்றும் சீன மொழிகளில் புத்தமான பற்றிய விளம்பர உரையையும், வலதுபுறத்தில் RM15 விலையுடன் ஆங்கிலம் மற்றும் சீன மொழிகளில் மாட்டிறைச்சி நூடுல்ஸ் மெனு உருப்படிகளையும் கொண்டுள்ளன.","jawi":"ڤاڤن ݢنتوڠ منمڤيلکن تيکس ڤروموسي دالم بهاس ملايو، ايڠݢريس، دان چينا مڠناي کسݢرن د سبله کيري، دان ايتم مينو مي داݢيڠ دالم بهاس ايڠݢريس دان چينا دڠن هرݢ RM15 د سبله کانن."}},{"photo_id":"PS_13","filename":"PS_13.jpg","district":"PS","district_name":"Petaling Street","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"Main facade features 'PAJAK GADAI HENG HUA SDN. BHD.' in Malay and Chinese. Side signs display 'PAJAK GADAI', 'PAWN SHOP', a traditional pawn character, and a guesthouse advertisement.","language_count":3,"representative":true,"caption":"Front view of the colorful Heng Hua Pawn Shop building facade, featuring a prominent multilingual mix of Malay, English, and Chinese business signage alongside a guesthouse advertisement.","notes":"Displays official corporate business status indicators alongside traditional pawnshop symbolic characters, contact numbers, and email addresses.","caption_i18n":{"zh":"色彩缤纷的兴华大押当铺建筑外立面正视图，突出展示马来文、英文、华文的多语商业招牌组合，旁边附有客栈广告。","ms":"Pandangan hadapan fasad bangunan Kedai Pajak Gadai Heng Hua yang berwarna-warni, mempamerkan campuran berbilang bahasa papan tanda perniagaan dalam bahasa Melayu, Inggeris, dan Cina yang menonjol, di sebelah iklan rumah tetamu.","ta":"வண்ணமயமான ஹெங் ஹுவா அடகுக் கடை கட்டிட முகப்பின் முன்புறத் தோற்றம்; இதில் மலாய், ஆங்கிலம் மற்றும் சீன மொழிகளின் கலவையான முக்கிய பன்மொழி வணிக அடையாளப் பலகைகளும், ஒரு விருந்தினர் இல்ல விளம்பரமும் இடம்பெற்றுள்ளன.","jawi":"ڤندڠن هادڤن فسد باڠونن کداي ڤاجق ݢاداي Heng Hua يڠ برورنا-ورني، ممڤاميرکن چمڤورن بربيلڠ بهاس ڤاڤن تندا ڤرنياݢاءن دالم بهاس ملايو، ايڠݢريس، دان چينا يڠ منونجول، د سبله اعلان رومه تتامو."},"notes_i18n":{"zh":"标示官方企业经营状态、传统当铺象征字、联系电话及电邮地址。","ms":"Memaparkan penunjuk status perniagaan korporat rasmi bersama aksara simbolik pajak gadai tradisional, nombor telefon, dan alamat e-mel.","ta":"உத்தியோகபூர்வ நிறுவன வணிக நிலை சுட்டிகள், பாரம்பரிய அடகுக் கடை குறியீட்டு எழுத்துக்கள், தொடர்பு எண்கள் மற்றும் மின்னஞ்சல் முகவரிகள் இடம்பெற்றுள்ளன.","jawi":"مماڤرکن ڤنونجوق ستاتوس ڤرنياݢاءن کورڤورت راسمي برسام اکسارا سيمبوليک ڤاجق ݢاداي تراديسيونل، نومبور تيليفون، دان علامت اي-ميل."},"text_content_i18n":{"zh":"主门面以马来文与中文显示 \"PAJAK GADAI HENG HUA SDN. BHD.\"。侧面招牌显示 \"PAJAK GADAI\"、\"PAWN SHOP\"、传统当字与一则民宿广告。","ms":"Fasad utama memaparkan \"PAJAK GADAI HENG HUA SDN. BHD.\" dalam bahasa Melayu dan Cina. Papan tanda sisi menampilkan \"PAJAK GADAI\", \"PAWN SHOP\", aksara tradisional pajak gadai, dan iklan rumah tetamu.","ta":"முக்கிய முகப்பில் மலாய் மற்றும் சீன மொழிகளில் \"PAJAK GADAI HENG HUA SDN. BHD.\" காட்டப்படுகிறது. பக்கப் பலகைகள் \"PAJAK GADAI\", \"PAWN SHOP\", பாரம்பரிய அடகுக்கடை எழுத்துரு, மற்றும் விருந்தினர் இல்ல விளம்பரத்தைக் கொண்டுள்ளன.","jawi":"فساد اوتاما مماڤرکن \"PAJAK GADAI HENG HUA SDN. BHD.\" دالم بهاس ملايو دان چينا. ڤاڤن تندا سيسي منمڤيلکن \"PAJAK GADAI\"، \"PAWN SHOP\"، اکسارا تراديسيونل ڤاجق ݢداي، دان ايکلن رومه تتامو."}},{"photo_id":"PS_14","filename":"PS_14.jpg","district":"PS","district_name":"Petaling Street","languages":{"zh":true,"ta":false,"ms":true,"en":false},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"Features 'RESTORAN MEE TARIK LANZHOU' in white text across the top, with the year '1983' and Chinese text for Lanzhou beef noodles centered below it.","language_count":2,"representative":false,"caption":null,"notes":"Features the establishment or heritage year 1983 integrated directly between the Chinese branding text.","notes_i18n":{"zh":"将创立或传承年份 1983 直接嵌入华文商号文字之间。","ms":"Tahun penubuhan atau warisan 1983 disepadukan secara langsung di antara teks penjenamaan Cina.","ta":"நிறுவப்பட்ட அல்லது பாரம்பரிய ஆண்டு 1983, சீன முத்திரை உரைக்கிடையே நேரடியாக இணைக்கப்பட்டுள்ளது.","jawi":"تاهون ڤنوبوهن اتاو وريسن 1983 دسڤادوکن سچارا لڠسوڠ د انتارا تيکس ڤنجنامأن چينا."},"text_content_i18n":{"zh":"招牌顶部以白色字体显示 \"RESTORAN MEE TARIK LANZHOU\"，下方居中为 \"1983\" 年份与代表兰州牛肉面的中文文字。","ms":"Memaparkan \"RESTORAN MEE TARIK LANZHOU\" dalam teks putih di bahagian atas, dengan tahun \"1983\" dan teks Cina untuk mi daging Lanzhou di tengah-tengah di bawahnya.","ta":"மேலே வெள்ளை உரையில் \"RESTORAN MEE TARIK LANZHOU\", மற்றும் அதன் கீழே மையத்தில் \"1983\" ஆண்டும் லான்சோ மாட்டிறைச்சி நூடுல்ஸுக்கான சீன உரையும் காட்டப்படுகின்றன.","jawi":"مماڤرکن \"RESTORAN MEE TARIK LANZHOU\" دالم تيکس ڤوتيه د بهاݢين اتس، دڠن تاهون \"1983\" دان تيکس چينا اونتوق مي داݢيڠ لانژو د تڠه-تڠه د باوهڽ."}},{"photo_id":"PS_15","filename":"PS_15.jpg","district":"PS","district_name":"Petaling Street","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"Displays 'RESTORAN' and the 'KIM YONG GEE' logo on the left. The right side features 'HONG KONG SIGNATURE BEEF NOODLE' along with matching Malay and Chinese text and corporate registration details.","language_count":3,"representative":false,"caption":null,"notes":"Includes corporate ownership text at the bottom right corner and promotional slogans highlighting regional acclaim.","notes_i18n":{"zh":"右下角附企业所有权字样，并配有突显地区声誉的宣传口号。","ms":"Termasuk teks pemilikan korporat di sudut kanan bawah dan cogan kata promosi yang menonjolkan pengiktirafan serantau.","ta":"கீழ் வலது மூலையில் நிறுவன உரிமை வாசகமும், பிராந்தியப் புகழை எடுத்துக்காட்டும் விளம்பர வாசகங்களும் இடம்பெற்றுள்ளன.","jawi":"ترماسوق تيکس ڤميليقن کورڤورت د سودوت کانن باوه دان چوݢن کات ڤروموسي يڠ منونجولکن ڤڠيعترافن سرنتاو."},"text_content_i18n":{"zh":"左侧显示 \"RESTORAN\" 与 \"KIM YONG GEE\" 标志。右侧显示 \"HONG KONG SIGNATURE BEEF NOODLE\"，配合相应的马来文与中文文字以及企业注册信息。","ms":"Memaparkan \"RESTORAN\" dan logo \"KIM YONG GEE\" di sebelah kiri. Bahagian kanan menampilkan \"HONG KONG SIGNATURE BEEF NOODLE\" bersama-sama dengan teks Melayu dan Cina yang sepadan serta butiran pendaftaran korporat.","ta":"இடதுபுறத்தில் \"RESTORAN\" மற்றும் \"KIM YONG GEE\" சின்னம் காட்டப்படுகின்றன. வலதுபுறத்தில் \"HONG KONG SIGNATURE BEEF NOODLE\" உடன் தொடர்புடைய மலாய் மற்றும் சீன உரையும் வணிகப் பதிவு விவரங்களும் காட்டப்படுகின்றன.","jawi":"مماڤرکن \"RESTORAN\" دان لوݢو \"KIM YONG GEE\" د سبله کيري. بهاݢين کانن منمڤيلکن \"HONG KONG SIGNATURE BEEF NOODLE\" برسام-سام دڠن تيکس ملايو دان چينا يڠ سڤادن سرتا بوتيرن ڤنداڤترن کورڤورت."}},{"photo_id":"BB_01","filename":"BB_01.jpg","district":"BB","district_name":"Bukit Bintang","languages":{"zh":false,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Transport","text_content":"A public transport sign displaying the station name “Bukit Bintang” together with the Malay word “Keluar” and the English word “EXIT”.","language_count":2,"representative":false,"caption":"Malay-English public transport signage at Bukit Bintang Monorail Station.","notes":"Malay and English function together as public service languages for navigation and accessibility.","caption_i18n":{"zh":"武吉免登单轨站的马来文-英文公共交通指示牌。","ms":"Papan tanda pengangkutan awam Melayu-Inggeris di Stesen Monorel Bukit Bintang.","ta":"புக்கிட் பிந்தாங் மோனோரயில் நிலையத்தில் உள்ள மலாய்-ஆங்கில பொதுப் போக்குவரத்து வழிகாட்டிப் பலகை.","jawi":"ڤاڤن تندا ڤڠڠکوتن عوام ملايو-ايڠݢريس دستيسين مونوريل بوکيت بينتڠ."},"notes_i18n":{"zh":"马来文与英文共同作为公共服务用语，承担导向与可达性功能。","ms":"Bahasa Melayu dan Inggeris berfungsi bersama sebagai bahasa perkhidmatan awam untuk navigasi dan keterangkuman.","ta":"வழிசெலுத்தலுக்கும் அணுகுதிறனுக்கும் மலாய் மற்றும் ஆங்கிலம் பொதுச் சேவை மொழிகளாக ஒன்றாக செயல்படுகின்றன.","jawi":"بهاس ملايو دان ايڠݢريس برفوڠسي برسام سباݢاي بهاس ڤرخدمتن عوام اونتوق نافيݢاسي دان کترڠکومن."},"text_content_i18n":{"zh":"一块公共交通招牌，显示站名\"武吉免登\"以及马来文 \"Keluar\" 与英文 \"EXIT\"。","ms":"Papan tanda pengangkutan awam yang memaparkan nama stesen \"Bukit Bintang\" bersama-sama dengan perkataan Melayu \"Keluar\" dan perkataan Inggeris \"EXIT\".","ta":"\"Bukit Bintang\" என்ற நிலையப் பெயருடன் மலாய் வார்த்தை \"Keluar\" மற்றும் ஆங்கில வார்த்தை \"EXIT\" ஆகியவற்றைக் காட்டும் பொதுப் போக்குவரத்து அடையாளப் பலகை.","jawi":"ڤاڤن تندا ڤڠاڠکوتن عوام يڠ مماڤرکن نام ستيسين \"Bukit Bintang\" برسام-سام دڠن ڤرکاتاءن ملايو \"Keluar\" دان ڤرکاتاءن ايڠݢريس \"EXIT\"."}},{"photo_id":"BB_02","filename":"BB_02.jpg","district":"BB","district_name":"Bukit Bintang","languages":{"zh":false,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"A restaurant sign featuring the Malay word “RESTORAN” at the top left and English restaurant branding and food descriptions in the center.","language_count":2,"representative":false,"caption":"English-Malay restaurant sign featuring Indian cuisine branding in Bukit Bintang.","notes":"English dominates the commercial branding, while Malay serves a functional role through the use of the word “RESTORAN”.","caption_i18n":{"zh":"武吉免登一家印度料理品牌的英文-马来文餐厅招牌。","ms":"Papan tanda restoran Inggeris-Melayu memaparkan jenama masakan India di Bukit Bintang.","ta":"புக்கிட் பிந்தாங்கில் இந்திய உணவு வகை முத்திரையுடன் கூடிய ஆங்கிலம்-மலாய் உணவகப் பலகை.","jawi":"ڤاڤن تندا ريستوران ايڠݢريس-ملايو مماڤرکن جنام ماسقن اينديا د بوکيت بينتڠ."},"notes_i18n":{"zh":"英文主导商业品牌呈现，马来文则通过「RESTORAN」一词承担功能性角色。","ms":"Bahasa Inggeris menguasai penjenamaan komersial, manakala bahasa Melayu memainkan peranan berfungsi melalui penggunaan perkataan \"RESTORAN\".","ta":"வணிக முத்திரையில் ஆங்கிலம் ஆதிக்கம் செலுத்தும் அதே நேரத்தில், மலாய் மொழி \"RESTORAN\" என்ற சொல்லின் வழியாக ஒரு செயல்பாட்டுப் பங்கை ஆற்றுகிறது.","jawi":"بهاس ايڠݢريس مڠواساءي ڤنجنامأن کومرسيال، ماناکالا بهاس ملايو ممأينکن ڤرانن برفوڠسي ملالوءي ڤڠݢوناءن ڤرکاتأن \"RESTORAN\"."},"text_content_i18n":{"zh":"一块餐厅招牌，左上方为马来文 \"RESTORAN\"，中央为英文餐厅品牌与食物描述。","ms":"Papan tanda restoran yang menampilkan perkataan Melayu \"RESTORAN\" di sebelah kiri atas dan jenama restoran Inggeris serta penerangan makanan di tengah.","ta":"மேல் இடதுபுறத்தில் மலாய் வார்த்தை \"RESTORAN\" உம் மையத்தில் ஆங்கில உணவகப் பெயரும் உணவு விளக்கங்களும் கொண்ட உணவக அடையாளப் பலகை.","jawi":"ڤاڤن تندا ريستورن يڠ منمڤيلکن ڤرکاتاءن ملايو \"RESTORAN\" د سبله کيري اتس دان جنام ريستورن ايڠݢريس سرتا ڤنرڠن ماکنن د تڠه."}},{"photo_id":"BB_03","filename":"BB_03.jpg","district":"BB","district_name":"Bukit Bintang","languages":{"zh":false,"ta":true,"ms":true,"en":true},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"A multilingual restaurant sign containing Tamil text at the top, English branding in the center, and Malay food names below.","language_count":3,"representative":true,"caption":"Multilingual Indian restaurant sign in Bukit Bintang.","notes":"Tamil reflects Indian cultural identity while English and Malay improve accessibility.","caption_i18n":{"zh":"武吉免登的多语印度餐厅招牌。","ms":"Papan tanda restoran India berbilang bahasa di Bukit Bintang.","ta":"புக்கிட் பிந்தாங்கில் உள்ள பன்மொழி இந்திய உணவகப் பலகை.","jawi":"ڤاڤن تندا ريستوران اينديا بربيلڠ بهاس د بوکيت بينتڠ."},"not KL\" bersama-sama nama tempat dan arah dalam bahasa Inggeris.","ta":"மோனோரயில் நடைபாதைக்குள் \"Keluar\" மற்றும் \"Laluan Monorel KL\" போன்ற மலாய் வார்த்தைகளும், ஆங்கில இடப் பெயர்களும் திசைகளும் கொண்ட திசைகாட்டிப் பலகை.","jawi":"ڤاڤن تندا اره د دالم لالوان مونوريل يڠ مماڤرکن ڤرکاتاءن ملايو سڤرتي \"Keluar\" دان \"Laluan Monorel KL\" برسام-سام نام تمڤت دان اره دالم بهاس ايڠݢريس."}},{"photo_id":"BB_06","filename":"BB_06.jpg","district":"BB","district_name":"Bukit Bintang","languages":{"zh":false,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Advertisement","text_content":"A large shopping mall advertisement featuring the Malay sentence “Percutian Anda Bermula Di Sini” together with the English slogan “Fly Better”.","language_count":2,"representative":false,"caption":"Malay-English commercial advertisement inside Pavilion Kuala Lumpur.","notes":"English dominates international branding while Malay localizes the advertisement for Malaysian consumers.","caption_i18n":{"zh":"Pavilion Kuala Lumpur 商场内的马来文-英文商业广告。","ms":"Iklan komersial Melayu-Inggeris di dalam Pavilion Kuala Lumpur.","ta":"பவிலியன் கோலாலம்பூரில் உள்ள மலாய்-ஆங்கில வணிக விளம்பரம்.","jawi":"اعلان کومرسيال ملايو-ايڠݢريس ددالم Pavilion Kuala Lumpur."},"notes_i18n":{"zh":"英文主导国际品牌呈现，马来文则将广告本土化以贴近马来西亚消费者。","ms":"Bahasa Inggeris menguasai penjenamaan antarabangsa manakala bahasa Melayu menempatkan iklan ini untuk pengguna Malaysia.","ta":"சர்வதேசப் பிராண்டிங்கில் ஆங்கிலம் ஆதிக்கம் செலுத்த, மலாய் மொழி இந்த விளம்பரத்தை மலேசியா நுகர்வோருக்காக உள்ளூர்மயமாக்குகிறது.","jawi":"بهاس ايڠݢريس مڠواساءي ڤنجنامأن انترباڠسا ماناکالا بهاس ملايو منمڤتکن اعلان اين اونتوق ڤڠݢونا مليسيا."},"text_content_i18n":{"zh":"大型购物商场广告，展示马来文句 \"Percutian Anda Bermula Di Sini\"（您的假期从这里开始）以及英文标语 \"Fly Better\"。","ms":"Iklan pusat membeli-belah besar yang memaparkan ayat Melayu \"Percutian Anda Bermula Di Sini\" bersama-sama slogan Inggeris \"Fly Better\".","ta":"மலாய் வாக்கியம் \"Percutian Anda Bermula Di Sini\" (உங்கள் விடுமுற ue,"en":true},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"A restaurant sign displaying large Chinese characters “Chong Qing Lao Hot Pot” prominently, with the English words “RESTORAN HOTPOT CHONG QING” above. Additional Chinese text appears on the storefront decorations below.","language_count":3,"representative":true,"caption":"Multilingual Chinese hotpot restaurant signage in Bukit Bintang featuring Chinese, English, and Malay.","notes":"Chinese dominates the restaurant identity, while English and Malay improve accessibility for local and international customers.","caption_i18n":{"zh":"武吉免登一家华人火锅餐厅的多语招牌，含华文、英文、马来文。","ms":"Papan tanda restoran stim panas Cina berbilang bahasa di Bukit Bintang yang memaparkan bahasa Cina, Inggeris, dan Melayu.","ta":"புக்கிட் பிந்தாங்கில் உள்ள பன்மொழி சீன ஹாட்பாட் உணவகப் பலகை; சீனம், ஆங்கிலம் மற்றும் மலாய் இடம்பெற்றுள்ளன.","jawi":"ڤاڤن تندا ريستوران ستيم ڤانس چينا بربيلڠ بهاس د بوکيت بينتڠ يڠ مماڤرکن بهاس چينا، ايڠݢريس، دان ملايو."},"notes_i18n":{"zh":"华文主导餐厅身份呈现，英文与马来文则提升本地与国际顾客的可达性。","ms":"Bahasa Cina menguasai identiti restoran, manakala bahasa Inggeris dan Melayu meningkatkan keterangkuman untuk pelanggan tempatan dan antarabangsa.","ta":"உணவகத்தின் அடையாளத்தில் சீனம் ஆதிக்கம் செலுத்த, ஆங்கிலமும் மலாயும் உள்ளூர் மற்றும் சர்வதேச வாடிக்கையாளர்களின் அணுகுதிறனை மேம்படுத்துகின்றன.","jawi":"بهاس چينا مڠواساءي ايدينتيتي ريستوران، ماناکالا بهاس ايڠݢريس دان ملايو منيڠکتکن کترڠکومن اونتوق ڤلڠݢن تمڤتن دان انترباڠسا."},"text_content_i18n":{"zh":"一块餐厅招牌，显眼地展示大字中文字符\"重庆老火锅\"，上方为英文 \"RESTORAN HOTPOT CHONG QING\"。下方店面装饰中还有更多中文文字。","ms":"Papan tanda restoran yang memaparkan aksara Cina besar \"Chong Qing Lao Hot Pot\" secara menonjol, dengan perkataan Inggeris \"RESTORAN HOTPOT CHONG QING\" di atasnya. Teks Cina tambahan muncul pada hiasan kedai di bawah.","ta":"\"Chong Qing Lao Hot Pot\" என்ற பெரிய சீன எழுத்துகளை முக்கியமாக காட்டும் உணவக அடையாளப் பலகை; அதற்கு மேலே ஆங்கில வார்த்தைகள் \"RESTORAN HOTPOT CHONG QING\" உள்ளன. கீழே கடை அலங்காரங்களில் கூடுதல் சீன உரை தோன்றுகிறது.","jawi":"ڤاڤن تندا ريستورن يڠ مماڤرکن اکسارا چينا بسر \"Chong Qing Lao Hot Pot\" سچارا منونجول، دڠن ڤرکاتاءن ايڠݢريس \"RESTORAN HOTPOT CHONG QING\" د اتسڽ. تيکس چينا تمبهن مونچول ڤد هياسن کداي د باوه."}},{"photo_id":"BB_09","filename":"BB_09.jpg","district":"BB","district_name":"Bukit Bintang","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"A restaurant sign displaying Chinese characters together with the English name “NOBLE HOUSE”. The word “RESTORAN” also appears in small text on the left side.","language_count":3,"representative":false,"caption":"Chinese-English-Malay restaurant signage in Bukit Bintang.","notes":"Chinese dominates the restaurant identity while English and Malay improve accessibility.","caption_i18n":{"zh":"武吉免登的华文-英文-马来文餐厅招牌。","ms":"Papan tanda restoran Cina-Inggeris-Melayu di Bukit Bintang.","ta":"புக்கிட் பிந்தாங்கில் உள்ள சீனம்-ஆங்கிலம்-மலாய் உணவகப் பலகை.","jawi":"ڤاڤن تندا ريستوران چينا-ايڠݢريس-ملايو د بوکيت بينتڠ."},"notes_i18n":{"zh":"华文主导餐厅身份呈现，英文与马来文则提升可达性。","ms":"Bahasa Cina menguasai identiti restoran manakala bahasa Inggeris dan Melayu meningkatkan keterangkuman.","ta":"உணவகத்தின் அடையாளத்தில் சீனம் ஆதிக்கம் செலுத்த, ஆங்கிலமும் மலாயும் அணுகுதிறனை மேம்படுத்துகின்றன.","jawi":"بهاس چينا مڠواساءي ايدينتيتي ريستوران ماناکالا بهاس ايڠݢريس دان ملايو منيڠکتکن کترڠکومن."},"text_content_i18n":{"zh":"一块餐厅招牌，展示中文字符与英文名 \"NOBLE HOUSE\"。左侧小字也有 \"RESTORAN\"。","ms":"Papan tanda restoran yang memaparkan aksara Cina bersama-sama nama Inggeris \"NOBLE HOUSE\". Perkataan \"RESTORAN\" juga muncul dalam teks kecil di sebelah kiri.","ta":"சீன எழுத்துகளும் ஆங்கிலப் பெயர் \"NOBLE HOUSE\" உம் கொண்ட உணவக அடையாளப் பலகை. இடதுபுறத்தில் சிறிய உரையில் \"RESTORAN\" என்ற வார்த்தையும் தோன்றுகிறது.","jawi":"ڤاڤن تندا ريستورن يڠ مماڤرکن اکسارا چينا برسام-سام نام ايڠݢريس \"NOBLE HOUSE\". ڤرکاتاءن \"RESTORAN\" جوݢ مونچول دالم تيکس کچيل د سبله کيري."}},{"photo_id":"BB_10","filename":"BB_10.jpg","district":"BB","district_name":"Bukit Bintang","languages":{"zh":false,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Transport","text_content":"A multilingual MRT directional sign displaying Malay words such as “Pintu” and “Peta Lokasi” together with English translations including “Location Map” and station information.","language_count":2,"representative":true,"caption":"Malay-English MRT directional signage in Bukit Bintang.","notes":"Malay and English are used together in public transport signage for local and international accessibility.","caption_i18n":{"zh":"武吉免登 MRT 站的马来文-英文方向指示牌。","ms":"Papan tanda arah MRT Melayu-Inggeris di Bukit Bintang.","ta":"புக்கிட் பிந்தாங்கில் உள்ள MRT நிலையத்தின் மலாய்-ஆங்கில வழிகாட்டிப் பலகை.","jawi":"ڤاڤن تندا اره MRT ملايو-ايڠݢريس د بوکيت بينتڠ."},"notes_i18n":{"zh":"马来文与英文共同用于公共交通指示，服务本地与国际可达性。","ms":"Bahasa Melayu dan Inggeris digunakan bersama dalam papan tanda pengangkutan awam untuk keterangkuman tempatan dan antarabangsa.","ta":"உள்ளூர் மற்றும் சர்வதேச அணுகுதிறனுக்காக பொதுப் போக்குவரத்து வழிகாட்டிப் பலகையில் மலாயும் ஆங்கிலமும் ஒன்றாக பயன்படுத்தப்படுகின்றன.","jawi":"بهاس ملايو دان ايڠݢريس دݢوناکن برسام دالم ڤاڤن تندا ڤڠڠکوتن عوام اونتوق کترڠکومن تمڤتن دان انترباڠسا."},"text_content_i18n":{"zh":"一块多语 MRT 指引招牌，显示 \"Pintu\" 与 \"Peta Lokasi\" 等马来文，配以 \"Location Map\" 等英文译文与站点信息。","ms":"Papan tanda arah MRT berbilang bahasa yang memaparkan perkataan Melayu seperti \"Pintu\" dan \"Peta Lokasi\" bersama-sama terjemahan Inggeris termasuk \"Location Map\" dan maklumat stesen.","ta":"\"Pintu\" மற்றும் \"Peta Lokasi\" போன்ற மலாய் வார்த்தைகளுடன் \"Location Map\" உள்ளிட்ட ஆங்கில மொழிபெயர்ப்புகளையும் நிலையத் தகவல்களையும் காட்டும் பன்மொழி MRT திசை அடையாளப் பலகை.","jawi":"ڤاڤن تندا اره MRT بربيلڠ بهاس يڠ مماڤرکن ڤرکاتاءن ملايو سڤرتي \"Pintu\" دان \"Peta Lokasi\" برسام-سام ترجمهن ايڠݢريس ترماسوق \"Location Map\" دان معلومت ستيسين."}},{"photo_id":"BB_11","filename":"BB_11.jpg","district":"BB","district_name":"Bukit Bintang","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":"Other","sign_type":"Shop/Restaurant","text_content":"A multilingual pharmacy sign displaying the Malay word “FARMASI”, the English words “Wellcome” and “PHARMACY”, Chinese characters, and the word “APOTIK”.","language_count":3,"representative":true,"caption":"Multilingual pharmacy signage in Bukit Bintang.","notes":"The sign combines Malay, English, Chinese, and another regional language to attract customers from diverse linguistic backgrounds.","caption_i18n":{"zh":"武吉免登的多语药房招牌。","ms":"Papan tanda farmasi berbilang bahasa di Bukit Bintang.","ta":"புக்கிட் பிந்தாங்கில் உள்ள பன்மொழி மருந்தகப் பலகை.","jawi":"ڤاڤن تندا فرماسي بربيلڠ بهاس د بوکيت بينتڠ."},"notes_i18n":{"zh":"招牌结合马来文、英文、华文及另一种地区语言，以吸引多元语言背景的顾客。","ms":"Papan tanda ini menggabungkan bahasa Melayu, Inggeris, Cina, dan satu lagi bahasa serantau untuk menarik pelanggan dari pelbagai latar belakang bahasa.","ta":"பல்வேறு மொழிப் பின்னணியிலிருந்து வரும் வாடிக்கையாளர்களை ஈர்க்க, இந்த அடையாளப் பலகை மலாய், ஆங்கிலம், சீனம் மற்றும் மற்றொரு பிராந்திய மொழியை ஒருங்கிணைக்கிறது.","jawi":"ڤاڤن تندا اين مڠݢابوڠکن بهاس ملايو، ايڠݢريس، چينا، دان ساتو لاݢي بهاس سرنتاو اونتوق مناريق ڤلڠݢن دري ڤلباݢاي لاتر بلاکڠ بهاس."},"text_content_i18n":{"zh":"一块多语药房招牌，显示马来文 \"FARMASI\"、英文 \"Wellcome\" 与 \"PHARMACY\"、中文字符及 \"APOTIK\" 一词。","ms":"Papan tanda farmasi berbilang bahasa yang memaparkan perkataan Melayu \"FARMASI\", perkataan Inggeris \"Wellcome\" dan \"PHARMACY\", aksara Cina, dan perkataan \"APOTIK\".","ta":"மலாய் வார்த்தை \"FARMASI\", ஆங்கில வார்த்தைகள் \"Wellcome\" மற்றும் \"PHARMACY\", சீன எழுத்துகள், மற்றும் \"APOTIK\" ஆகிய வார்த்தைகளைக் கொண்ட பன்மொழி மருந்தகப் பலகை.","jawi":"ڤاڤن تندا فرماسي بربيلڠ بهاس يڠ مماڤرکن ڤرکاتاءن ملايو \"FARMASI\"، ڤرکاتاءن ايڠݢريس \"Wellcome\" دان \"PHARMACY\"، اکسارا چينا، دان ڤرکاتاءن \"APOTIK\"."}},{"photo_id":"BB_12","filename":"BB_12.jpg","district":"BB","district_name" sinesses can still be part of the wider visual environment around Little India.","notes":"Chinese appears together with Malay and English; no Tamil.","caption_i18n":{"zh":"选取此招牌是因为它呈现清晰的多语商业格局。华语、马来文、英文同时出现，展示非印度族裔商业如何依然融入小印度周边的整体视觉环境。","ms":"Papan tanda ini dipilih kerana ia menunjukkan corak komersial berbilang bahasa yang jelas. Bahasa Cina, Melayu, dan Inggeris muncul bersama, menunjukkan bagaimana perniagaan bukan India masih boleh menjadi sebahagian daripada persekitaran visual yang lebih luas di sekitar Little India.","ta":"தெளிவான பன்மொழி வணிக முறையை காட்டுவதால் இந்த அடையாளப் பலகை தேர்ந்தெடுக்கப்பட்டுள்ளது. சீனம், மலாய் மற்றும் ஆங்கிலம் ஒன்றாக இடம்பெற்று, இந்திய சாரா வணிகங்கள் எவ்வாறு லிட்டில் இந்தியா சுற்றியுள்ள பரந்த காட்சி சூழலின் ஒரு பகுதியாக இருக்க முடியும் என்பதை காட்டுகின்றன.","jawi":"ڤاڤن تندا اين دڤيليه کرنا اي منونجوقکن چورق کومرسيال بربيلڠ بهاس يڠ جلس. بهاس چينا، ملايو، دان ايڠݢريس مونچول برسام، منونجوقکن باݢايمان ڤرنياݢاءن بوکن اينديا ماسيه بوليه منجادي سباهاݢين درڤد ڤرسکيتارن ۏيسوال يڠ لبيه لواس د سکيتر Little India."},"notes_i18n":{"zh":"华文与马来文、英文同时出现；不含 Tamil。","ms":"Bahasa Cina muncul bersama bahasa Melayu dan Inggeris; tanpa Tamil.","ta":"சீனம், மலாய் மற்றும் ஆங்கிலத்துடன் ஒன்றாக இடம்பெற்றுள்ளது; தமிழ் இல்லை.","jawi":"بهاس چينا مونچول برسام بهاس ملايو دان ايڠݢريس؛ تنڤا تاميل."},"text_content_i18n":{"zh":"一块五金与油漆店招牌，含中文字符、马来文用语，以及英文品牌或商业信息。","ms":"Papan tanda kedai perkakasan dan cat dengan aksara Cina, perkataan Melayu, dan maklumat jenama atau perniagaan Inggeris.","ta":"சீன எழுத்துகள், மலாய் வார்த்தைகள், மற்றும் ஆங்கில பிராண்ட்/வணிகத் தகவலைக் கொண்ட இரும்புக்கடை மற்றும் பெயிண்ட் கடைப் பலகை.","jawi":"ڤاڤن تندا کداي ڤرکاکسن دان چت دڠن اکسارا چينا، ڤرکاتاءن ملايو، دان معلومت جنام اتاو ڤرنياݢأن ايڠݢريس."}},{"photo_id":"LI_04","filename":"LI_04.jpg","district":"LI","district_name":"Little India","languages":{"zh":true,"ta":false,"ms":true,"en":true},"other_language":null,"sign_type":"Shop/Restaurant","text_content":"A motorcycle shop sign with t <script>
  /* ----------------------------------------------------------
     Back link: route to originating section (top / bottom)
     ---------------------------------------------------------- */
  (function() {
    const backLink = document.getElementById('back-link');
    if (!backLink) return;
    const source = sessionStorage.getItem('hub-source');
    if (source === 'top') {
      backLink.href = '../index.html#section-top';
    } else if (source === 'bottom') {
      backLink.href = '../index.html#section-bottom';
    }
    // 否则保留默认 '../index.html'（用户直接访问 hub URL 时的 fallback）
  })();


// ============================================================================
// MAP LOADING — via <object> so it works with file:// AND http(s)://
// ============================================================================
const stage  = document.getElementById('map-stage');
const host   = document.getElementById('map-host');
const mapSvg = document.getElementById('map-svg');

function attachClusterHandlers() {
  document.querySelectorAll('.cluster').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      openClusterModal(el);
    });
  });
}
// Inline SVG — handlers attach immediately (DOM ready by this script's position)
attachClusterHandlers();

// ============================================================================
// ZOOM / PAN — applied to host wrapper (not the SVG inside the object)
// ============================================================================
let zoom = 1, panX = 0, panY = 0;
let isPanning = false, lastX = 0, lastY = 0;

function clampPan() {
  // host = 100% stage；scale(zoom) 后视觉 = stage * zoom；slack = stage * (zoom − 1)。
  const w = stage.clientWidth;
  const h = stage.clientHeight;
  const slackX = Math.max(0, w * (zoom - 1));
  const slackY = Math.max(0, h * (zoom - 1));
  panX = Math.min(0, Math.max(-slackX, panX));
  panY = Math.min(0, Math.max(-slackY, panY));
}
function applyTransform() {
  clampPan();
  host.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  document.getElementById('zoom-pct').textContent = `${Math.round(zoom*100)}%`;
}

document.getElementById('zoom-in').onclick = () => {
  const rect = stage.getBoundingClientRect();
  zoomAt(rect.width/2, rect.height/2, 1.25);
};
document.getElementById('zoom-out').onclick = () => {
  const rect = stage.getBoundingClientRect();
  zoomAt(rect.width/2, rect.height/2, 1/1.25);
};
document.getElementById('zoom-reset').onclick = () => {
  zoom = 1; panX = 0; panY = 0; applyTransform();
};

function zoomAt(cx, cy, factor) {
  const newZoom = Math.max(1.0, Math.min(4, zoom * factor));
  panX = cx - (cx - panX) * (newZoom / zoom);
  panY = cy - (cy - panY) * (newZoom / zoom);
  zoom = newZoom;
  applyTransform();
}

stage.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = stage.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  zoomAt(cx, cy, factor);
}, { passive: false });

stage.addEventListener('mousedown', (e) => {
  if (e.target.closest('.zoom-btn')) return;
  isPanning = true;
  lastX = e.clientX; lastY = e.clientY;
  stage.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  panX += e.clientX - lastX;
  panY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isPanning = false;
  stage.style.cursor = 'grab';
});

// ============================================================================
// SIGNS DATA — inlined above
// ============================================================================
const signsIndex = {};
(function loadSigns() {
  const raw = document.getElementById('signs-data').textContent;
  const data = JSON.parse(raw);

})();

const LANG_NAMES = {

// === Sign-detail modal labels (6/2) ===
const SIGN_DETAIL_LABELS = {
